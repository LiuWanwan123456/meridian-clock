<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>子午流注 · 真太阳时</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #F0F5F0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Noto Serif SC', 'SimSun', serif;
      padding: 16px;
      /* 增加极淡的山水肌理感 */
      background-image: radial-gradient(ellipse at 20% 50%, rgba(200,216,200,0.2) 0%, transparent 70%),
                        radial-gradient(ellipse at 80% 80%, rgba(200,216,200,0.15) 0%, transparent 60%);
    }
    .container {
      max-width: 420px;
      width: 100%;
      background: linear-gradient(145deg, #F5F8F5 0%, #E8EFE8 100%);
      border-radius: 32px;
      padding: 20px 16px 24px;
      box-shadow: 0 8px 32px rgba(58,75,58,0.10), 0 1px 4px rgba(58,75,58,0.04);
      border: 1px solid rgba(200,212,200,0.2);
      text-align: center;
      position: relative;
    }
    /* 极淡的山水装饰 */
    .container::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: radial-gradient(ellipse at 30% 100%, rgba(180,200,180,0.06) 0%, transparent 70%),
                  radial-gradient(ellipse at 70% 100%, rgba(180,200,180,0.04) 0%, transparent 60%);
      pointer-events: none;
      border-radius: 0 0 32px 32px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 8px;
      color: #2C3A33;
    }
    .header h1 span { color: #B89A6A; }
    .gps-status {
      font-size: 12px;
      color: #7A8C82;
      margin-top: 4px;
    }
    .gps-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #C8D5C8;
      margin-right: 6px;
      vertical-align: middle;
      transition: background 0.4s;
    }
    .gps-dot.ok { background: #3E6B5A; animation: pulse 2s infinite; }
    .gps-dot.err { background: #B06050; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .clock-wrap {
      width: 100%;
      max-width: 320px;
      margin: 12px auto 0;
      aspect-ratio: 1/1;
      position: relative;
      z-index: 1;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 50%;
      box-shadow: 0 4px 20px rgba(58,75,58,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
      background: #F7FAF7;
    }
    .time-big {
      font-size: 36px;
      font-weight: 300;
      letter-spacing: 4px;
      color: #2C3A33;
      margin-top: 12px;
      position: relative;
      z-index: 1;
    }
    .time-label {
      font-size: 11px;
      letter-spacing: 5px;
      color: #7A8C82;
      margin-top: 2px;
      position: relative;
      z-index: 1;
    }
    .sc-card {
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(200,212,200,0.2);
      border-radius: 16px;
      padding: 12px 16px;
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(58,75,58,0.04);
      position: relative;
      z-index: 1;
    }
    .sc-symbol {
      font-size: 40px;
      font-weight: 300;
      color: #3E6B5A;
      min-width: 48px;
      text-align: center;
    }
    .sc-info h2 {
      font-size: 15px;
      font-weight: 400;
      color: #2C3A33;
      letter-spacing: 2px;
    }
    .sc-info .meridian {
      font-size: 12px;
      color: #5D7A6A;
      letter-spacing: 1px;
    }
    .sc-info .tip {
      font-size: 11px;
      color: #7A8C82;
      margin-top: 3px;
    }
    .offset-bar {
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      margin-top: 12px;
      background: rgba(255,255,255,0.4);
      border-radius: 12px;
      border: 1px solid rgba(200,212,200,0.12);
      position: relative;
      z-index: 1;
    }
    .offset-bar span {
      font-size: 11px;
      color: #7A8C82;
    }
    .offset-bar strong {
      display: block;
      font-size: 14px;
      font-weight: 400;
      color: #2C3A33;
      margin-top: 2px;
    }

    .grid-title {
      font-size: 12px;
      color: #7A8C82;
      letter-spacing: 6px;
      margin: 16px 0 10px;
      padding-top: 14px;
      border-top: 1px solid rgba(200,212,200,0.2);
      position: relative;
      z-index: 1;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      position: relative;
      z-index: 1;
    }
    .grid-item {
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(200,212,200,0.12);
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transition: all 0.3s;
      min-height: 70px;
    }
    .grid-item.current {
      background: rgba(62,107,90,0.08);
      border-color: #3E6B5A;
      box-shadow: 0 0 0 1px rgba(62,107,90,0.1);
    }
    .grid-item .gname {
      font-size: 15px;
      font-weight: 500;
      color: #3D5C4A;
      letter-spacing: 2px;
    }
    .grid-item.current .gname {
      color: #2C3A33;
    }
    .grid-item .gtime {
      font-size: 11px;
      color: #7A8C82;
      letter-spacing: 0.5px;
    }
    .grid-item .gmeridian {
      font-size: 15px;
      font-weight: 400;
      color: #5D7A6A;
      letter-spacing: 1px;
    }
    .grid-item.current .gmeridian {
      color: #2C3A33;
    }
    .grid-item .badge {
      font-size: 8px;
      background: #3E6B5A;
      color: #F7FAF7;
      padding: 1px 8px;
      border-radius: 4px;
      display: none;
      letter-spacing: 1px;
      margin-left: 4px;
    }
    .grid-item.current .badge { display: inline-block; }

    /* ===== 农历卡片（页面最下方） ===== */
    .lunar-card {
      width: 100%;
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(200,212,200,0.15);
      border-radius: 14px;
      padding: 12px 16px;
      margin-top: 16px;
      text-align: center;
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(58,75,58,0.03);
      position: relative;
      z-index: 1;
    }
    .lunar-card .ganzhi {
      font-size: 18px;
      font-weight: 500;
      color: #2C3A33;
      letter-spacing: 3px;
    }
    .lunar-card .detail {
      font-size: 13px;
      color: #5D7A6A;
      letter-spacing: 2px;
      margin-top: 2px;
    }
    .lunar-card .huangdi {
      font-size: 13px;
      color: #5D7A6A;
      letter-spacing: 2px;
      margin-top: 4px;
    }
    .lunar-card .huangdi span {
      font-weight: 500;
      color: #2C3A33;
    }
    .lunar-card .source {
      font-size: 9px;
      color: #8AAA98;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .footer {
      font-size: 10px;
      color: #7A8C82;
      letter-spacing: 4px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(200,212,200,0.15);
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>子午流注<span>·</span>真太阳时</h1>
    <div class="gps-status">
      <span class="gps-dot" id="gpsDot"></span>
      <span id="gpsText">定位中...</span>
    </div>
  </div>
  <div class="clock-wrap">
    <canvas id="clockCanvas" width="400" height="400"></canvas>
  </div>
  <div class="time-big" id="digitalTime">--:--:--</div>
  <div class="time-label" id="modeLabel">真太阳时</div>
  <div class="sc-card">
    <div class="sc-symbol" id="scSymbol">子</div>
    <div class="sc-info">
      <h2 id="scName">子时 · 胆经</h2>
      <div class="meridian" id="scMeridian">足少阳胆经当令</div>
      <div class="tip" id="scTip">宜深眠，胆汁排毒</div>
    </div>
  </div>
  <div class="offset-bar">
    <span>经度 <strong id="ofLon">--°</strong></span>
    <span>日差 <strong id="ofOffset">--分</strong></span>
    <span>时区 <strong id="ofZone">--</strong></span>
  </div>

  <div class="grid-title">— 十二时辰 · 子午流注 —</div>
  <div class="grid" id="shichenGrid"></div>

  <!-- ===== 农历卡片（页面最下方） ===== -->
  <div class="lunar-card" id="lunarCard">
    <div class="ganzhi" id="lunarGanZhi">⏳ 加载中...</div>
    <div class="detail" id="lunarDetail"></div>
    <div class="huangdi" id="huangdiYear">黄帝纪年 <span>--</span> 年</div>
    <div class="source" id="lunarSource">🌐 香港天文台 + lunar-javascript</div>
  </div>

  <div class="footer">天人合一 · 顺时养生</div>
</div>

<script type="module">
// ============================================================
// 1. 导入 lunar-javascript 库（用于月柱、日柱）
// ============================================================
import { Solar } from 'lunar-javascript';

// ============================================================
// 2. 十二时辰数据
// ============================================================
var SHICHEN = [
  { idx:0,  glyph:'子', name:'子时', range:'23:00–01:00', hours:[23,0],  meridian:'足少阳胆经', tip:'宜深眠，胆汁排毒' },
  { idx:1,  glyph:'丑', name:'丑时', range:'01:00–03:00', hours:[1,2],   meridian:'足厥阴肝经', tip:'宜熟睡，养肝血' },
  { idx:2,  glyph:'寅', name:'寅时', range:'03:00–05:00', hours:[3,4],   meridian:'手太阴肺经', tip:'宜静卧，养肺气' },
  { idx:3,  glyph:'卯', name:'卯时', range:'05:00–07:00', hours:[5,6],   meridian:'手阳明大肠经', tip:'宜如厕，饮温水' },
  { idx:4,  glyph:'辰', name:'辰时', range:'07:00–09:00', hours:[7,8],   meridian:'足阳明胃经', tip:'宜早餐，养胃气' },
  { idx:5,  glyph:'巳', name:'巳时', range:'09:00–11:00', hours:[9,10],  meridian:'足太阴脾经', tip:'宜工作，运化旺' },
  { idx:6,  glyph:'午', name:'午时', range:'11:00–13:00', hours:[11,12], meridian:'手少阴心经', tip:'宜小憩，养心神' },
  { idx:7,  glyph:'未', name:'未时', range:'13:00–15:00', hours:[13,14], meridian:'手太阳小肠经', tip:'宜轻活，助消化' },
  { idx:8,  glyph:'申', name:'申时', range:'15:00–17:00', hours:[15,16], meridian:'足太阳膀胱经', tip:'宜饮水，可锻炼' },
  { idx:9,  glyph:'酉', name:'酉时', range:'17:00–19:00', hours:[17,18], meridian:'足少阴肾经', tip:'宜休息，收藏精' },
  { idx:10, glyph:'戌', name:'戌时', range:'19:00–21:00', hours:[19,20], meridian:'手厥阴心包经', tip:'宜散步，勿激动' },
  { idx:11, glyph:'亥', name:'亥时', range:'21:00–23:00', hours:[21,22], meridian:'手少阳三焦经', tip:'宜入睡，百脉养' }
];

function getShichen(h) {
  if (h === 23) return SHICHEN[0];
  for (var i = 0; i < SHICHEN.length; i++) {
    var sc = SHICHEN[i];
    if (sc.hours.indexOf(h) !== -1) return sc;
  }
  return SHICHEN[0];
}

// ============================================================
// 3. 状态
// ============================================================
var userLon = null;
var solarOffsetMin = 0;
var mode = 'solar';

// ============================================================
// 4. GPS
// ============================================================
function requestGPS() {
  if (!navigator.geolocation) {
    setGPS('err', '不支持GPS');
    userLon = 120;
    computeOffset();
    return;
  }
  navigator.geolocation.getCurrentPosition(onGPS, onGPSErr, {
    enableHighAccuracy: true,
    timeout: 15000,
    maximumAge: 60000
  });
}

function onGPS(pos) {
  userLon = pos.coords.longitude;
  computeOffset();
  setGPS('ok', pos.coords.latitude.toFixed(1) + '°N');
  document.getElementById('ofLon').textContent = userLon.toFixed(2) + '°';
  var tz = -(new Date().getTimezoneOffset() / 60);
  document.getElementById('ofZone').textContent = 'UTC+' + tz;
}

function onGPSErr(err) {
  var msg = '定位失败';
  if (err.code === 1) msg = '权限被拒';
  else if (err.code === 2) msg = '信号弱';
  else if (err.code === 3) msg = '定位超时';
  setGPS('err', msg);
  userLon = 120;
  computeOffset();
  document.getElementById('ofLon').textContent = '120.00°';
}

function setGPS(s, t) {
  var dot = document.getElementById('gpsDot');
  dot.className = 'gps-dot ' + (s === 'ok' ? 'ok' : s === 'err' ? 'err' : '');
  document.getElementById('gpsText').textContent = t;
}

// ============================================================
// 5. 真太阳时算法
// ============================================================
function computeOffset() {
  var now = new Date();
  var tzMin = -now.getTimezoneOffset();
  var central = (tzMin / 60) * 15;
  var lonCorr = (userLon - central) * 4;
  var doy = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
  var B = (360 / 365 * (doy - 81)) * Math.PI / 180;
  var EoT = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
  solarOffsetMin = lonCorr + EoT;
  var sign = solarOffsetMin >= 0 ? '+' : '';
  document.getElementById('ofOffset').textContent = sign + solarOffsetMin.toFixed(1) + '分';
}

function getSolarTime() {
  return new Date(Date.now() + solarOffsetMin * 60000);
}

function getDisplayTime() {
  return mode === 'solar' ? getSolarTime() : new Date();
}

// ============================================================
// 6. 表盘绘制（已调整配色）
// ============================================================
var canvas = document.getElementById('clockCanvas');
var ctx = canvas.getContext('2d');
var cx = 200, cy = 200, R = 185;

var NUM_R1 = 32;
var NUM_R2 = 72;
var INNER_R1 = 80;
var INNER_R2 = 122;
var OUTER_R1 = 130;
var OUTER_R2 = 175;
var EDGE_R = 185;

var HOUR_LEN = 28;
var MIN_LEN  = 45;
var SEC_LEN  = 55;

// 配色常量（宋瓷天青风格）
var C = {
  bg:      '#F7FAF7',
  ring:    'rgba(62,107,90,0.12)',
  ringLight: 'rgba(62,107,90,0.08)',
  inner:   'rgba(200,216,200,0.12)',
  innerAlt: 'rgba(200,216,200,0.06)',
  active:  'rgba(62,107,90,0.18)',
  textMain: '#2C3A33',
  textSub:  '#5D7A6A',
  textLight: '#7A8C82',
  gold:    '#B89A6A',
  red:     '#B06050',
  hour:    '#2C3A33',
  minute:  '#3E6B5A',
  second:  '#B06050'
};

var ANGLE_DATA = [
  { label: '子', startDeg: -120, endDeg: -60, inner: true },
  { label: '丑', startDeg: -60, endDeg: 0, inner: true },
  { label: '寅', startDeg: 0, endDeg: 60, inner: true },
  { label: '卯', startDeg: 60, endDeg: 120, inner: true },
  { label: '辰', startDeg: 120, endDeg: 180, inner: true },
  { label: '巳', startDeg: 180, endDeg: 240, inner: true },
  { label: '午', startDeg: -120, endDeg: -60, inner: false },
  { label: '未', startDeg: -60, endDeg: 0, inner: false },
  { label: '申', startDeg: 0, endDeg: 60, inner: false },
  { label: '酉', startDeg: 60, endDeg: 120, inner: false },
  { label: '戌', startDeg: 120, endDeg: 180, inner: false },
  { label: '亥', startDeg: 180, endDeg: 240, inner: false }
];

function getCurrentAngleIndex(h) {
  if (h >= 23 || h < 1) return 0;
  if (h >= 1 && h < 3) return 1;
  if (h >= 3 && h < 5) return 2;
  if (h >= 5 && h < 7) return 3;
  if (h >= 7 && h < 9) return 4;
  if (h >= 9 && h < 11) return 5;
  if (h >= 11 && h < 13) return 6;
  if (h >= 13 && h < 15) return 7;
  if (h >= 15 && h < 17) return 8;
  if (h >= 17 && h < 19) return 9;
  if (h >= 19 && h < 21) return 10;
  if (h >= 21 && h < 23) return 11;
  return 0;
}

function drawClock(t) {
  ctx.clearRect(0, 0, 400, 400);
  var h = t.getHours();
  var m = t.getMinutes();
  var s = t.getSeconds();

  // 表盘底色（微暖月白）
  ctx.beginPath();
  ctx.arc(cx, cy, EDGE_R, 0, Math.PI * 2);
  ctx.fillStyle = C.bg;
  ctx.fill();
  ctx.strokeStyle = 'rgba(200,212,200,0.15)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  var currentIdx = getCurrentAngleIndex(h);

  for (var i = 0; i < ANGLE_DATA.length; i++) {
    var sc = ANGLE_DATA[i];
    var isActive = (i === currentIdx);
    var isInner = sc.inner;

    var sa = sc.startDeg * Math.PI / 180;
    var ea = sc.endDeg * Math.PI / 180;
    var r1 = isInner ? INNER_R1 : OUTER_R1;
    var r2 = isInner ? INNER_R2 : OUTER_R2;

    ctx.beginPath();
    ctx.moveTo(cx + r1 * Math.cos(sa), cy + r1 * Math.sin(sa));
    ctx.arc(cx, cy, r1, sa, ea, false);
    ctx.arc(cx, cy, r2, ea, sa, true);
    ctx.closePath();

    if (isActive) {
      ctx.fillStyle = C.active;
    } else {
      ctx.fillStyle = (i % 2 === 0) ? C.inner : C.innerAlt;
    }
    ctx.fill();
    ctx.strokeStyle = 'rgba(200,212,200,0.10)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    var midDeg = (sc.startDeg + sc.endDeg) / 2;
    var midRad = midDeg * Math.PI / 180;
    var labelR = (r1 + r2) / 2;

    ctx.save();
    ctx.translate(cx + labelR * Math.cos(midRad), cy + labelR * Math.sin(midRad));
    ctx.rotate(midRad + Math.PI / 2);
    ctx.font = (isInner ? 16 : 22) + 'px "Noto Serif SC", serif';
    ctx.fillStyle = isActive ? C.textMain : C.textLight;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(sc.label, 0, 0);
    ctx.restore();
  }

  // 分隔线
  ctx.beginPath();
  ctx.arc(cx, cy, INNER_R2, 0, Math.PI * 2);
  ctx.strokeStyle = C.ring;
  ctx.lineWidth = 1.2;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, OUTER_R2, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(200,212,200,0.12)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 1-12 数字
  for (var i = 1; i <= 12; i++) {
    var deg = i * 30 - 90;
    var rad = deg * Math.PI / 180;
    var nr = (NUM_R1 + NUM_R2) / 2;
    ctx.font = '15px "Noto Serif SC", serif';
    ctx.fillStyle = C.textSub;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i, cx + nr * Math.cos(rad), cy + nr * Math.sin(rad));
  }

  // 太极图
  ctx.font = '22px serif';
  ctx.fillStyle = 'rgba(62,107,90,0.12)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('☯', cx, cy);

  // 时针
  var hAngle = ((h % 12) * 30 + m * 0.5 - 90) * Math.PI / 180;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(hAngle);
  ctx.beginPath();
  ctx.moveTo(-6, 0);
  ctx.lineTo(HOUR_LEN, 0);
  ctx.strokeStyle = C.hour;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  // 分针
  var mAngle = (m * 6 + s * 0.1 - 90) * Math.PI / 180;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(mAngle);
  ctx.beginPath();
  ctx.moveTo(-5, 0);
  ctx.lineTo(MIN_LEN, 0);
  ctx.strokeStyle = C.minute;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  // 秒针
  var sAngle = (s * 6 - 90) * Math.PI / 180;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(sAngle);
  ctx.beginPath();
  ctx.moveTo(-8, 0);
  ctx.lineTo(SEC_LEN, 0);
  ctx.strokeStyle = C.second;
  ctx.lineWidth = 1.2;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  // 中心装饰
  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, Math.PI * 2);
  ctx.fillStyle = C.textMain;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = C.second;
  ctx.fill();
}

// ============================================================
// 7. 数字时间
// ============================================================
function updateDigital(t) {
  var hh = String(t.getHours()).padStart(2, '0');
  var mm = String(t.getMinutes()).padStart(2, '0');
  var ss = String(t.getSeconds()).padStart(2, '0');
  document.getElementById('digitalTime').textContent = hh + ':' + mm + ':' + ss;
}

// ============================================================
// 8. 时辰卡片
// ============================================================
function updateShichenCard(h) {
  var sc = getShichen(h);
  document.getElementById('scSymbol').textContent = sc.glyph;
  document.getElementById('scName').textContent = sc.name + ' · ' + sc.meridian;
  document.getElementById('scMeridian').textContent = sc.meridian + '当令';
  document.getElementById('scTip').textContent = sc.tip;
}

// ============================================================
// 9. 流注表
// ============================================================
function buildGrid() {
  var g = document.getElementById('shichenGrid');
  g.innerHTML = '';
  for (var i = 0; i < SHICHEN.length; i++) {
    var sc = SHICHEN[i];
    var d = document.createElement('div');
    d.className = 'grid-item';
    d.id = 'sc-' + sc.idx;
    d.innerHTML =
      '<div class="gname">' + sc.name + '</div>' +
      '<div class="gtime">' + sc.range + '</div>' +
      '<div class="gmeridian">' + sc.meridian + '</div>' +
      '<div class="badge">当前</div>';
    g.appendChild(d);
  }
}

var lastIdx = -1;
function updateGrid(h) {
  var sc = getShichen(h);
  if (sc.idx === lastIdx) return;
  lastIdx = sc.idx;
  var items = document.querySelectorAll('.grid-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.remove('current');
  }
  var el = document.getElementById('sc-' + sc.idx);
  if (el) { el.classList.add('current'); }
}

// ============================================================
// 10. 黄帝纪年计算（以立春为界）
// ============================================================
function getHuangdiYear(date) {
  var year = date.getFullYear();
  var month = date.getMonth() + 1;
  var day = date.getDate();
  if (month < 2 || (month === 2 && day < 4)) {
    return year + 2697 - 1;
  } else {
    return year + 2697;
  }
}

// ============================================================
// 11. 农历数据更新
// ============================================================
function updateLunarCard() {
  var now = new Date();
  var year = now.getFullYear();
  var month = now.getMonth() + 1;
  var day = now.getDate();

  document.getElementById('lunarGanZhi').textContent = '⏳ 加载中...';
  document.getElementById('lunarDetail').textContent = '';
  document.getElementById('huangdiYear').innerHTML = '黄帝纪年 <span>--</span> 年';
  document.getElementById('lunarSource').textContent = '🌐 正在请求...';

  var monthGZ = '⏳';
  var dayGZ = '⏳';
  try {
    var solar = Solar.fromYmd(year, month, day);
    var lunar = solar.getLunar();
    monthGZ = lunar.getMonthInGanZhi();
    dayGZ = lunar.getDayInGanZhi();
  } catch (e) {
    monthGZ = '--';
    dayGZ = '--';
  }

  var huangdi = getHuangdiYear(now);

  var dateStr = year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
  var url = 'https://data.weather.gov.hk/weatherAPI/opendata/lunardate.php?date=' + dateStr;

  fetch(url)
    .then(function(response) {
      if (!response.ok) throw new Error('HTTP ' + response.status);
      return response.json();
    })
    .then(function(data) {
      var yearGZ = data.LunarYear || '';
      var lunarDateStr = data.LunarDate || '';
      var zodiac = '';
      if (yearGZ.includes('，')) {
        var parts = yearGZ.split('，');
        yearGZ = parts[0];
        yearGZ = yearGZ.replace(/年$/, '');
        zodiac = parts[1];
      }

      document.getElementById('lunarGanZhi').textContent = yearGZ + '年 ' + monthGZ + '月 ' + dayGZ + '日';
      document.getElementById('lunarDetail').textContent = zodiac + '年 农历' + lunarDateStr;
      document.getElementById('huangdiYear').innerHTML = '黄帝纪年 <span>' + huangdi + '</span> 年';
      document.getElementById('lunarSource').textContent = '🌐 香港天文台 + lunar-javascript';
    })
    .catch(function(err) {
      document.getElementById('lunarGanZhi').textContent = '--年 ' + monthGZ + '月 ' + dayGZ + '日';
      document.getElementById('lunarDetail').textContent = '--年 农历 --月 --日';
      document.getElementById('huangdiYear').innerHTML = '黄帝纪年 <span>' + huangdi + '</span> 年';
      document.getElementById('lunarSource').textContent = '⚠️ 网络异常，部分数据加载失败';
    });
}

// ============================================================
// 12. 主循环
// ============================================================
function tick() {
  var t = getDisplayTime();
  drawClock(t);
  updateDigital(t);
  updateShichenCard(t.getHours());
  updateGrid(t.getHours());
}

// ============================================================
// 13. 初始化
// ============================================================
buildGrid();
requestGPS();
tick();
setInterval(tick, 1000);

updateLunarCard();
setInterval(updateLunarCard, 60000);

console.log('✅ 子午流注已启动（宋瓷天青釉风格）');
console.log('📐 黄帝纪年以立春为界，' + new Date().getFullYear() + '年 = 黄帝纪年 ' + getHuangdiYear(new Date()) + ' 年');
</script>
