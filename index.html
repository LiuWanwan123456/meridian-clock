function getTermsForYear(year) {
  if (SOLAR_TERMS_DB[year]) return SOLAR_TERMS_DB[year];
  var keys = Object.keys(SOLAR_TERMS_DB).map(Number).sort(function(a,b){return a-b;});
  if (year < keys[0]) return SOLAR_TERMS_DB[keys[0]];
  return SOLAR_TERMS_DB[keys[keys.length - 1]];
}

function findTermByName(terms, name) {
  for (var i = 0; i < terms.length; i++) {
    if (terms[i].name === name) return terms[i];
  }
  return null;
}

function getYearGanZhi(date) {
  var year = date.getFullYear();
  var terms = getTermsForYear(year);
  var liChun = findTermByName(terms, '立春');
  var targetYear = year;
  if (liChun) {
    var liChunDate = new Date(year, liChun.month - 1, liChun.day);
    if (date < liChunDate) {
      targetYear = year - 1;
    }
  }
  var gan = Lunar.tianGan[(targetYear - 4) % 10];
  var zhi = Lunar.diZhi[(targetYear - 4) % 12];
  return gan + zhi;
}

function getYearZodiac(date) {
  var year = date.getFullYear();
  var terms = getTermsForYear(year);
  var liChun = findTermByName(terms, '立春');
  var targetYear = year;
  if (liChun) {
    var liChunDate = new Date(year, liChun.month - 1, liChun.day);
    if (date < liChunDate) {
      targetYear = year - 1;
    }
  }
  return Lunar.shengXiao[(targetYear - 4) % 12];
}

// 4. 正确的月柱计算（以节气"节"为界）
// ============================================================
function getMonthGanZhi(date) {
  var year = date.getFullYear();
  var terms = getTermsForYear(year);
  var jieNames = ['立春','惊蛰','清明','立夏','芒种','小暑',
                  '立秋','白露','寒露','立冬','大雪','小寒'];
  var diZhiMonth = ['寅','卯','辰','巳','午','未',
                    '申','酉','戌','亥','子','丑'];

  var monthIdx = 0;
  for (var i = 0; i < jieNames.length; i++) {
    var term = findTermByName(terms, jieNames[i]);
    if (!term) continue;
    var termDate = new Date(year, term.month - 1, term.day);
    if (date >= termDate) {
      monthIdx = i;
    }
  }

  // 年干起月干：甲己年起丙寅，乙庚年起戊寅，丙辛年起庚寅，丁壬年起壬寅，戊癸年起甲寅
  var yearGan = getYearGanZhi(date)[0];
  var baseGanMap = {'甲':'丙','乙':'戊','丙':'庚','丁':'壬','戊':'甲',
                    '己':'丙','庚':'戊','辛':'庚','壬':'壬','癸':'甲'};
  var baseGan = baseGanMap[yearGan] || '丙';
  var ganIndex = Lunar.tianGan.indexOf(baseGan);
  var monthGanIndex = (ganIndex + monthIdx) % 10;
  return Lunar.tianGan[monthGanIndex] + diZhiMonth[monthIdx];
}

function getDayGanZhi(date) {
  var base = new Date(2000, 0, 7);
  var offset = Math.floor((date - base) / 86400000);
  var gan = Lunar.tianGan[((offset % 10) + 10) % 10];
  var zhi = Lunar.diZhi[((offset % 12) + 12) % 12];
  return gan + zhi;
}

// ============================================================
// 十二时辰数据
// ============================================================
var SHICHEN = [
  { idx:0,  glyph:'子', name:'子时', range:'23:00–01:00', hours:[23,0],  meridian:'足少阳胆经', tip:'宜深眠，胆汁排毒' },
  { idx:1,  glyph:'丑', name:'丑时', range:'01:00–03:00', hours:[1,2],   meridian:'足厥阴肝经', tip:'宜熟睡，养肝血' },
  { idx:2,  glyph:'寅', name:'寅时', range:'03:00–05:00', hours:[3,4],   meridian:'手太阴肺经', tip:'宜静卧，养肺气' },
  { idx:3,  glyph:'卯', name:'卯时', range:'05:00–07:00', hours:[5,6],   meridian:'手阳明大肠经', tip:'宜如厕，饮温水' },
  { idx:4,  glyph:'辰', name:'辰时', range:'07:00–09:00', hours:[7,8],   meridian:'足阳明胃经', tip:'宜早餐，养胃气' },
  { idx:5,  glyph:'巳', name:'巳时', range:'09:00–11:00', hours:[9,10],  meridian:'足太阴脾经', tip:'宜工作，运化旺' },

  { idx:7,  glyph:'未', name:'未时', range:'13:00–15:00', hours:[13,14], meridian:'手太阳小肠经', tip:'宜轻活，助消化' },
  { idx:8,  glyph:'申', name:'申时', range:'15:00–17:00', hours:[15,16], meridian:'足太阳膀胱经', tip:'宜饮水，可锻炼' },
  { idx:9,  glyph:'酉', name:'酉时', range:'17:00–19:00', hours:[17,18], meridian:'足少阴肾经', tip:'宜休息，收藏精' },
  { idx:10, glyph:'戌', name:'戌时', range:'19:00–21:00', hours:[19,20], meridian:'手厥阴心包经', tip:'宜散步，勿激动' },
  { idx:11, glyph:'亥', name:'亥时', range:'21:00–23:00', hours:[21,22], meridian:'手少阳三焦经', tip:'宜入睡，百脉养' }
];

function getShichen(h) {
  if (h === 23) return SHICHEN[0];
  for (var i = 0; i < SHICHEN.length; i++) {
    var sc = SHICHEN[i];
    if (sc.hours.indexOf(h) !== -1) return sc;
  }
  return SHICHEN[0];
}

// ============================================================
// 状态
// ============================================================
var userLon = null;
var solarOffsetMin = 0;
var mode = 'solar';

// ============================================================
// GPS
// ============================================================
function requestGPS() {
  if (!navigator.geolocation) {
    setGPS('err', '不支持GPS');
    userLon = 120;
    computeOffset();
    return;
  }
  navigator.geolocation.getCurrentPosition(onGPS, onGPSErr, {
    enableHighAccuracy: true,
    timeout: 15000,
    maximumAge: 60000
  });
}

function onGPS(pos) {
  userLon = pos.coords.longitude;
  computeOffset();
  setGPS('ok', pos.coords.latitude.toFixed(1) + '°N');
  document.getElementById('ofLon').textContent = userLon.toFixed(2) + '°';
  var tz = -(new Date().getTimezoneOffset() / 60);
  document.getElementById('ofZone').textContent = 'UTC+' + tz;
}

function onGPSErr(err) {
  var msg = '定位失败';
  if (err.code === 1) msg = '权限被拒';
  else if (err.code === 2) msg = '信号弱';
  else if (err.code === 3) msg = '定位超时';
  setGPS('err', msg);
  userLon = 120;
  computeOffset();
  document.getElementById('ofLon').textContent = '120.00°';
}

function setGPS(s, t) {
  var dot = document.getElementById('gpsDot');
  dot.className = 'gps-dot ' + (s === 'ok' ? 'ok' : s === 'err' ? 'err' : '');
  document.getElementById('gpsText').textContent = t;
}

// ============================================================
// 真太阳时算法
// ============================================================
function computeOffset() {
  var now = new Date();
  var tzMin = -now.getTimezoneOffset();
  var central = (tzMin / 60) * 15;
  var lonCorr = (userLon - central) * 4;
  var doy = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
  var B = (360 / 365 * (doy - 81)) * Math.PI / 180;
  var EoT = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
  solarOffsetMin = lonCorr + EoT;
  var sign = solarOffsetMin >= 0 ? '+' : '';
  document.getElementById('ofOffset').textContent = sign + solarOffsetMin.toFixed(1) + '分';
}

function getSolarTime() {
  return new Date(Date.now() + solarOffsetMin * 60000);
}

function getDisplayTime() {
  return mode === 'solar' ? getSolarTime() : new Date();
}

// ============================================================
// 表盘绘制
// ============================================================
var canvas = document.getElementById('clockCanvas');
var ctx = canvas.getContext('2d');
var cx = 200, cy = 200, R = 185;

var NUM_R1 = 32;
var NUM_R2 = 72;
var INNER_R1 = 80;
var INNER_R2 = 122;
var OUTER_R1 = 130;
var OUTER_R2 = 175;
var EDGE_R = 185;

var HOUR_LEN = 28;
var MIN_LEN  = 45;
var SEC_LEN  = 55;

var ANGLE_DATA = [
  { label: '子', startDeg: -120, endDeg: -60, inner: true },
  { label: '丑', startDeg: -60, endDeg: 0, inner: true },
  { label: '寅', startDeg: 0, endDeg: 60, inner: true },
  { label: '卯', startDeg: 60, endDeg: 120, inner: true },
  { label: '辰', startDeg: 120, endDeg: 180, inner: true },
  { label: '巳', startDeg: 180, endDeg: 240, inner: true },
  { label: '午', startDeg: -120, endDeg: -60, inner: false },
  { label: '未', startDeg: -60, endDeg: 0, inner: false },
  { label: '申', startDeg: 0, endDeg: 60, inner: false },
  { label: '酉', startDeg: 60, endDeg: 120, inner: false },
  { label: '戌', startDeg: 120, endDeg: 180, inner: false },
  { label: '亥', startDeg: 180, endDeg: 240, inner: false }
];

function getCurrentAngleIndex(h) {
  if (h >= 23 || h < 1) return 0;
  if (h >= 1 && h < 3) return 1;
  if (h >= 3 && h < 5) return 2;
  if (h >= 5 && h < 7) return 3;
  if (h >= 7 && h < 9) return 4;
  if (h >= 9 && h < 11) return 5;
  if (h >= 11 && h < 13) return 6;
  if (h >= 13 && h < 15) return 7;
  if (h >= 15 && h < 17) return 8;
  if (h >= 17 && h < 19) return 9;
  if (h >= 19 && h < 21) return 10;
  if (h >= 21 && h < 23) return 11;
  return 0;
}

function drawClock(t) {
  ctx.clearRect(0, 0, 400, 400);
  var h = t.getHours();
  var m = t.getMinutes();
  var s = t.getSeconds();

  ctx.beginPath();
  ctx.arc(cx, cy, EDGE_R, 0, Math.PI * 2);
  ctx.fillStyle = '#F7FBF9';
  ctx.fill();
  ctx.strokeStyle = 'rgba(58,107,90,0.15)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  var currentIdx = getCurrentAngleIndex(h);

  for (var i = 0; i < ANGLE_DATA.length; i++) {
    var sc = ANGLE_DATA[i];
    var isActive = (i === currentIdx);
    var isInner = sc.inner;

    var sa = sc.startDeg * Math.PI / 180;
    var ea = sc.endDeg * Math.PI / 180;
    var r1 = isInner ? INNER_R1 : OUTER_R1;
    var r2 = isInner ? INNER_R2 : OUTER_R2;

    ctx.beginPath();
    ctx.moveTo(cx + r1 * Math.cos(sa), cy + r1 * Math.sin(sa));
    ctx.arc(cx, cy, r1, sa, ea, false);
    ctx.arc(cx, cy, r2, ea, sa, true);
    ctx.closePath();

    if (isActive) {
      ctx.fillStyle = 'rgba(58,107,90,0.20)';
    } else {
      ctx.fillStyle = (i % 2 === 0) ? 'rgba(200,221,216,0.12)' : 'rgba(234,243,238,0.06)';
    }
    ctx.fill();
    ctx.strokeStyle = 'rgba(58,107,90,0.08)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    var midDeg = (sc.startDeg + sc.endDeg) / 2;
    var midRad = midDeg * Math.PI / 180;
    var labelR = (r1 + r2) / 2;

    ctx.save();
    ctx.translate(cx + labelR * Math.cos(midRad), cy + labelR * Math.sin(midRad));
    ctx.rotate(midRad + Math.PI / 2);
    ctx.font = (isInner ? 16 : 22) + 'px "Noto Serif SC", serif';
    ctx.fillStyle = isActive ? '#274D3E' : '#6B8A7A';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(sc.label, 0, 0);
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(cx, cy, INNER_R2, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(58,107,90,0.15)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, OUTER_R2, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(58,107,90,0.10)';
  ctx.lineWidth = 1;
  ctx.stroke();

  for (var i = 1; i <= 12; i++) {
    var deg = i * 30 - 90;
    var rad = deg * Math.PI / 180;
    var nr = (NUM_R1 + NUM_R2) / 2;
    ctx.font = '15px "Noto Serif SC", serif';
    ctx.fillStyle = '#3D5C4A';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i, cx + nr * Math.cos(rad), cy + nr * Math.sin(rad));
  }

  ctx.font = '22px serif';
  ctx.fillStyle = 'rgba(58,107,90,0.15)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('☯', cx, cy);

  var hAngle = ((h % 12) * 30 + m * 0.5 - 90) * Math.PI / 180;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(hAngle);
  ctx.beginPath();
  ctx.moveTo(-6, 0);
  ctx.lineTo(HOUR_LEN, 0);
  ctx.strokeStyle = '#274D3E';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  var mAngle = (m * 6 + s * 0.1 - 90) * Math.PI / 180;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(mAngle);
  ctx.beginPath();
  ctx.moveTo(-5, 0);
  ctx.lineTo(MIN_LEN, 0);
  ctx.strokeStyle = '#3A6B5A';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  var sAngle = (s * 6 - 90) * Math.PI / 180;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(sAngle);
  ctx.beginPath();
  ctx.moveTo(-8, 0);
  ctx.lineTo(SEC_LEN, 0);
  ctx.strokeStyle = '#B04040';
  ctx.lineWidth = 1.2;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#274D3E';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#B04040';
  ctx.fill();
}

// ============================================================
// 数字时间
// ============================================================
function updateDigital(t) {
  var hh = String(t.getHours()).padStart(2, '0');
  var mm = String(t.getMinutes()).padStart(2, '0');
  var ss = String(t.getSeconds()).padStart(2, '0');
  document.getElementById('digitalTime').textContent = hh + ':' + mm + ':' + ss;
}

// ============================================================
// 时辰卡片
// ============================================================
function updateShichenCard(h) {
  var sc = getShichen(h);
  document.getElementById('scSymbol').textContent = sc.glyph;
  document.getElementById('scName').textContent = sc.name + ' · ' + sc.meridian;
  document.getElementById('scMeridian').textContent = sc.meridian + '当令';
  document.getElementById('scTip').textContent = sc.tip;
}

// ============================================================
// 流注表
// ============================================================
function buildGrid() {
  var g = document.getElementById('shichenGrid');
  g.innerHTML = '';
  for (var i = 0; i < SHICHEN.length; i++) {
    var sc = SHICHEN[i];
    var d = document.createElement('div');
    d.className = 'grid-item';
    d.id = 'sc-' + sc.idx;
    d.innerHTML =
      '<div class="gname">' + sc.name + '</div>' +
      '<div class="gtime">' + sc.range + '</div>' +
      '<div class="gmeridian">' + sc.meridian + '</div>' +
      '<div class="badge">当前</div>';
    g.appendChild(d);
  }
}

var lastIdx = -1;
function updateGrid(h) {
  var sc = getShichen(h);
  if (sc.idx === lastIdx) return;
  lastIdx = sc.idx;
  var items = document.querySelectorAll('.grid-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.remove('current');
  }
  var el = document.getElementById('sc-' + sc.idx);
  if (el) { el.classList.add('current'); }
}

// ============================================================
// 农历 + 节气弹窗
// ============================================================
function renderLunarModal() {
  var now = new Date();

  // 年柱、月柱、日柱（以立春为界，以节为界）
  var yearGZ = getYearGanZhi(now);
  var monthGZ = getMonthGanZhi(now);
  var dayGZ = getDayGanZhi(now);
  var zodiac = getYearZodiac(now);

  // 农历日期
  var lunarDate = Lunar.getLunarDate(now);
  var lunarDateStr = lunarDate.monthName + '月' + lunarDate.dayName;

  document.getElementById('lunarGanZhi').textContent = yearGZ + '年 ' + monthGZ + '月 ' + dayGZ + '日';
  document.getElementById('lunarDetail').textContent = '农历 ' + lunarDateStr;
  document.getElementById('lunarZodiac').textContent = '🐉 ' + zodiac + '年';
  document.getElementById('lunarSource').textContent = '📐 以立春为岁首，以节为月界';

  // 节气
  var year = now.getFullYear();
  var month = now.getMonth() + 1;
  var day = now.getDate();
  var todayStr = year + '-' + String(month).padStart(2,'0') + '-' + String(day).padStart(2,'0');
  var terms = getTermsForYear(year);
  var termToday = '';
  var grid = document.getElementById('termGrid');
  grid.innerHTML = '';

  for (var i = 0; i < terms.length; i++) {
    var term = terms[i];
    var termDateStr = year + '-' + String(term.month).padStart(2,'0') + '-' + String(term.day).padStart(2,'0');
    var isToday = (termDateStr === todayStr);
    if (isToday) termToday = term.name;
    var div = document.createElement('div');
    div.className = 'term-item' + (isToday ? ' today' : '');
    div.innerHTML =
      '<div class="tname">' + term.name + '</div>' +
      '<div class="tdate">' + term.month + '月' + term.day + '日 ' +
      String(term.hour).padStart(2,'0') + ':' + String(term.minute).padStart(2,'0') + '</div>';
    grid.appendChild(div);
  }
  document.getElementById('termToday').textContent = termToday ? '🌿 今日节气：' + termToday : '';
}

// ============================================================
// 弹窗控制
// ============================================================
var modalOverlay = document.getElementById('modalOverlay');
var btnLunar = document.getElementById('btnLunar');
var modalClose = document.getElementById('modalClose');

function openModal() {
  renderLunarModal();
  modalOverlay.classList.add('show');
}

function closeModal() {
  modalOverlay.classList.remove('show');
}

btnLunar.addEventListener('click', openModal);
modalClose.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', function(e) {
  if (e.target === modalOverlay) closeModal();
});

// ============================================================
// 主循环
// ============================================================
function tick() {
  var t = getDisplayTime();
  drawClock(t);
  updateDigital(t);
  updateShichenCard(t.getHours());
  updateGrid(t.getHours());
}

buildGrid();
requestGPS();
tick();
setInterval(tick, 1000);

console.log('✅ 子午流注已启动');
console.log('📐 农历年柱以立春为界，月柱以节为界');
</script>
