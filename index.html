<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>子午流注 · 真太阳时</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: #F5EDE4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* ===== 主容器 ===== */
        .container {
            max-width: 480px;
            width: 100%;
            background: #FDF8F2;
            border-radius: 28px;
            padding: 24px 20px 28px;
            box-shadow: 0 8px 40px rgba(139, 0, 0, 0.12);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '☯';
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 80px;
            opacity: 0.06;
            transform: rotate(15deg);
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            padding-bottom: 14px;
            border-bottom: 2px solid #E8D5C0;
            margin-bottom: 18px;
        }
        .header h1 {
            font-size: 22px;
            color: #6B2E1A;
            letter-spacing: 6px;
            font-weight: 700;
        }
        .header .sub {
            font-size: 12px;
            color: #A0806A;
            margin-top: 2px;
        }

        /* ===== 定位状态 ===== */
        .location-status {
            text-align: center;
            font-size: 12px;
            color: #8B6914;
            background: #F5EDE4;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin: 0 auto 12px;
            width: auto;
        }
        .location-status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .location-status .dot.success {
            background: #2E7D32;
        }
        .location-status .dot.loading {
            background: #F9A825;
            animation: blink 1s infinite;
        }
        .location-status .dot.error {
            background: #C62828;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .location-status .longitude-display {
            font-weight: 600;
            color: #4A2A1A;
        }

        /* ===== 中心时间显示 ===== */
        .center-display {
            text-align: center;
            padding: 8px 0 16px;
            position: relative;
        }
        .center-display .time {
            font-size: 56px;
            font-weight: 700;
            color: #3D2012;
            letter-spacing: 4px;
            font-variant-numeric: tabular-nums;
            line-height: 1.1;
        }
        .center-display .time .seconds {
            font-size: 20px;
            color: #B8860B;
            font-weight: 400;
            margin-left: 4px;
        }
        .center-display .time .label-true {
            font-size: 12px;
            color: #8B1A1A;
            font-weight: 400;
            margin-left: 8px;
            background: #F5EDE4;
            padding: 0 10px;
            border-radius: 12px;
        }
        .center-display .meridian-main {
            font-size: 28px;
            color: #8B1A1A;
            font-weight: 700;
            margin-top: 2px;
            background: #F5EDE4;
            display: inline-block;
            padding: 2px 24px;
            border-radius: 30px;
            letter-spacing: 2px;
        }
        .center-display .advice {
            font-size: 14px;
            color: #A0806A;
            margin-top: 4px;
            letter-spacing: 1px;
        }
        .center-display .advice span {
            background: #EDE3D8;
            padding: 1px 14px;
            border-radius: 12px;
        }

        /* ===== 修正信息 ===== */
        .correction-info {
            display: flex;
            justify-content: center;
            gap: 16px;
            font-size: 11px;
            color: #A0806A;
            margin: 6px 0 12px;
            flex-wrap: wrap;
        }
        .correction-info .item {
            background: #F5EDE4;
            padding: 2px 12px;
            border-radius: 12px;
        }
        .correction-info .item .val {
            font-weight: 600;
            color: #5A3E2B;
        }

        /* ===== 环形经络网格 ===== */
        .ring-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin: 12px 0 16px;
            padding: 8px;
            background: #F5EDE4;
            border-radius: 20px;
            position: relative;
        }
        .ring-grid::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #FDF8F2;
            border: 2px solid #DCC8B6;
            pointer-events: none;
            box-shadow: 0 0 0 4px #F5EDE4;
        }

        .cell {
            background: #FDF8F2;
            border-radius: 10px;
            padding: 8px 2px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.4s ease;
            cursor: default;
            position: relative;
            z-index: 1;
        }
        .cell .hour-label {
            font-size: 10px;
            color: #B09880;
            font-weight: 500;
        }
        .cell .name {
            font-size: 14px;
            font-weight: 600;
            color: #5A3E2B;
            margin-top: 1px;
            transition: color 0.3s;
        }
        .cell .icon {
            font-size: 12px;
        }

        .cell.active {
            background: #FFD700;
            border-color: #B8860B;
            transform: scale(1.04);
            box-shadow: 0 2px 16px rgba(255, 215, 0, 0.45);
        }
        .cell.active .name {
            color: #6B1A1A;
        }
        .cell.active .hour-label {
            color: #8B6914;
        }

        /* ===== 控制面板 ===== */
        .controls {
            background: #F5EDE4;
            border-radius: 16px;
            padding: 14px 16px;
            margin: 4px 0 12px;
        }
        .controls .row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }
        .controls .row:last-child {
            margin-bottom: 0;
        }
        .controls label {
            font-size: 13px;
            color: #5A3E2B;
            font-weight: 500;
        }
        .btn {
            background: #DCC8B6;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            color: #3D2012;
            transition: all 0.15s;
            min-width: 40px;
            touch-action: manipulation;
            user-select: none;
        }
        .btn:active {
            transform: scale(0.92);
            background: #C8B4A0;
        }
        .btn-primary {
            background: #8B1A1A;
            color: #fff;
        }
        .btn-primary:active {
            background: #6B1414;
        }
        .btn-secondary {
            background: #B8A99A;
            color: #fff;
        }
        .btn-secondary:active {
            background: #A09080;
        }
        .btn-success {
            background: #2E7D32;
            color: #fff;
        }
        .btn-success:active {
            background: #1B5E20;
        }
        .offset-text {
            font-size: 18px;
            font-weight: 700;
            color: #8B1A1A;
            min-width: 48px;
            text-align: center;
        }
        .manual-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .manual-row select {
            padding: 4px 6px;
            border-radius: 8px;
            border: 1.5px solid #DCC8B6;
            font-size: 16px;
            background: #fff;
            width: 60px;
            text-align: center;
            color: #3D2012;
            font-weight: 600;
        }
        .manual-row select:focus {
            outline: none;
            border-color: #8B1A1A;
        }

        /* ===== 状态栏 ===== */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #A0806A;
            padding: 4px 2px 0;
            border-top: 1px solid #EDE3D8;
            margin-top: 8px;
            padding-top: 8px;
            flex-wrap: wrap;
            gap: 4px;
        }
        .status-bar .mode {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .status-bar .tag {
            background: #EDE3D8;
            padding: 0 10px;
            border-radius: 10px;
            font-size: 10px;
            color: #6B4E3A;
        }

        /* ===== 加载遮罩 ===== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(253, 248, 242, 0.92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.6s ease;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-overlay .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #E8D5C0;
            border-top-color: #8B1A1A;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-overlay p {
            margin-top: 16px;
            color: #5A3E2B;
            font-size: 14px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 400px) {
            .container {
                padding: 16px 12px 20px;
            }
            .center-display .time {
                font-size: 42px;
            }
            .center-display .meridian-main {
                font-size: 22px;
            }
            .cell .name {
                font-size: 12px;
            }
            .correction-info {
                font-size: 10px;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

<!-- 加载遮罩 -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>📍 正在获取位置，计算真太阳时...</p>
</div>

<div class="container" id="app">
    <!-- 头部 -->
    <div class="header">
        <h1>☯ 子午流注</h1>
        <div class="sub">真太阳时 · 天人相应</div>
    </div>

    <!-- 定位状态 -->
    <div style="text-align:center;">
        <div class="location-status" id="locationStatus">
            <span class="dot loading" id="statusDot"></span>
            <span id="statusText">正在获取位置...</span>
            <span class="longitude-display" id="longitudeDisplay"></span>
        </div>
    </div>

    <!-- 中心显示 -->
    <div class="center-display">
        <div class="time">
            <span id="hourDisplay">--</span>:<span id="minDisplay">--</span>
            <span class="seconds" id="secDisplay">--</span>
            <span class="label-true">真太阳时</span>
        </div>
        <div class="meridian-main" id="meridianMain">--</div>
        <div class="advice"><span id="adviceText">🌿 养生指南</span></div>
    </div>

    <!-- 修正信息 -->
    <div class="correction-info" id="correctionInfo">
        <span class="item">经度修正: <span class="val" id="longOffsetDisplay">--</span></span>
        <span class="item">均时差: <span class="val" id="eotDisplay">--</span></span>
        <span class="item">总修正: <span class="val" id="totalOffsetDisplay">--</span></span>
    </div>

    <!-- 环形经络网格 -->
    <div class="ring-grid" id="ringGrid"></div>

    <!-- 控制面板 -->
    <div class="controls" id="controlsPanel">
        <div class="row">
            <label>📍 定位模式</label>
            <button class="btn btn-success" id="btnAutoLocate">GPS 定位</button>
            <button class="btn btn-secondary" id="btnManualMode">手动输入</button>
        </div>
        <div class="manual-row" id="manualRow" style="display:none;">
            <label>经度: </label>
            <input type="number" id="manualLongitude" value="116.4" step="0.01" style="width:80px;padding:6px 8px;border-radius:8px;border:1.5px solid #DCC8B6;font-size:16px;">
            <span style="color:#5A3E2B;">°E</span>
            <button class="btn btn-primary" id="btnApplyManual">应用</button>
        </div>
    </div>

    <!-- 状态栏 -->
    <div class="status-bar">
        <span class="mode" id="statusMode">📍 真太阳时模式</span>
        <span class="tag" id="statusTag">实时更新</span>
    </div>
</div>

<script>
    // ============================================================
    // 数据：十二经络（时辰起始小时）
    // ============================================================
    const MERIDIANS = [
        { hour: 23, name: '胆经', icon: '🌙', advice: '宜入睡' },
        { hour: 1,  name: '肝经', icon: '💤', advice: '熟睡养肝' },
        { hour: 3,  name: '肺经', icon: '🌅', advice: '深睡养肺' },
        { hour: 5,  name: '大肠经', icon: '🚽', advice: '宜排便' },
        { hour: 7,  name: '胃经', icon: '🍳', advice: '吃早餐' },
        { hour: 9,  name: '脾经', icon: '💪', advice: '效率高峰' },
        { hour: 11, name: '心经', icon: '🧠', advice: '精神饱满' },
        { hour: 13, name: '小肠经', icon: '🥗', advice: '午餐时间' },
        { hour: 15, name: '膀胱经', icon: '💧', advice: '多喝水' },
        { hour: 17, name: '肾经', icon: '🌆', advice: '收藏精气' },
        { hour: 19, name: '心包经', icon: '❤️', advice: '放松心情' },
        { hour: 21, name: '三焦经', icon: '🛀', advice: '准备入睡' }
    ];

    // ============================================================
    // 状态
    // ============================================================
    let currentLongitude = null;        // 当前使用的经度
    let isUsingGps = false;
    let clockInterval = null;           // 时钟更新定时器

    // ============================================================
    // DOM 引用
    // ============================================================
    const $hour = document.getElementById('hourDisplay');
    const $min = document.getElementById('minDisplay');
    const $sec = document.getElementById('secDisplay');
    const $meridianMain = document.getElementById('meridianMain');
    const $advice = document.getElementById('adviceText');
    const $grid = document.getElementById('ringGrid');
    const $statusMode = document.getElementById('statusMode');
    const $statusTag = document.getElementById('statusTag');
    const $longOffset = document.getElementById('longOffsetDisplay');
    const $eotDisplay = document.getElementById('eotDisplay');
    const $totalOffset = document.getElementById('totalOffsetDisplay');
    const $longitudeDisplay = document.getElementById('longitudeDisplay');
    const $statusText = document.getElementById('statusText');
    const $statusDot = document.getElementById('statusDot');
    const $loadingOverlay = document.getElementById('loadingOverlay');
    const $manualRow = document.getElementById('manualRow');
    const $manualLongitude = document.getElementById('manualLongitude');

    // ============================================================
    // 工具：均时差计算（修复版）
    // ============================================================
    function equationOfTime(dayOfYear) {
        // 近似公式，精度约 ±1 分钟
        const B = (360.0 / 365.0) * (dayOfYear - 81);
        const BRad = B * Math.PI / 180;
        return 9.87 * Math.sin(2 * BRad) - 7.53 * Math.cos(BRad) - 1.5 * Math.sin(BRad);
    }

    // ============================================================
    // 核心：计算真太阳时（修复版）
    // ============================================================
    function calculateTrueSolarTime(longitude) {
        const now = new Date();
        const utcHours = now.getUTCHours();
        const utcMinutes = now.getUTCMinutes();
        const utcSeconds = now.getUTCSeconds();

        // 【修复】正确计算一年中的第几天
        const startOfYear = new Date(now.getFullYear(), 0, 1); // 1月1日
        const dayOfYear = Math.floor((now - startOfYear) / 86400000) + 1;

        // 1. 经度修正（中国时区基准经度 120°E）
        const standardMeridian = 120.0;
        const longitudeOffset = (longitude - standardMeridian) * 4.0; // 分钟

        // 2. 均时差修正（EoT）
        const eot = equationOfTime(dayOfYear);

        // 3. 总修正（分钟）
        const totalOffset = longitudeOffset + eot;

        // 4. 应用到 UTC 时间
        let totalMinutes = utcHours * 60 + utcMinutes + totalOffset;
        let finalHour = Math.floor(totalMinutes / 60) % 24;
        let finalMinute = Math.round(totalMinutes % 60);

        // 处理进位/借位
        if (finalMinute >= 60) {
            finalMinute -= 60;
            finalHour = (finalHour + 1) % 24;
        }
        if (finalMinute < 0) {
            finalMinute += 60;
            finalHour = (finalHour - 1 + 24) % 24;
        }
        if (finalHour < 0) finalHour += 24;

        return {
            hour: finalHour,
            minute: finalMinute,
            second: utcSeconds,
            longitudeOffset: longitudeOffset,
            eot: eot,
            totalOffset: totalOffset,
            dayOfYear: dayOfYear
        };
    }

    // ============================================================
    // 获取当前当令经络
    // ============================================================
    function getMeridianInfo(hour) {
        if (hour === 23 || hour === 0) return MERIDIANS[0];
        for (const m of MERIDIANS) {
            if (hour >= m.hour && hour < m.hour + 2) {
                return m;
            }
        }
        return MERIDIANS[0];
    }

    // ============================================================
    // 构建经络网格
    // ============================================================
    function buildGrid() {
        $grid.innerHTML = '';
        MERIDIANS.forEach((m) => {
            const div = document.createElement('div');
            div.className = 'cell';
            div.dataset.name = m.name;
            const hourStr = String(m.hour).padStart(2, '0') + ':00';
            div.innerHTML = `
                <div class="hour-label">${hourStr}</div>
                <div class="icon">${m.icon}</div>
                <div class="name">${m.name}</div>
            `;
            $grid.appendChild(div);
        });
    }
    buildGrid();

    // ============================================================
    // 更新所有 UI（修复版）
    // ============================================================
    function updateUI() {
        // 【修复】如果经度未设置，不执行更新
        if (currentLongitude === null) {
            return;
        }

        const result = calculateTrueSolarTime(currentLongitude);
        const { hour, minute, second, longitudeOffset, eot, totalOffset } = result;

        // 时间
        $hour.textContent = String(hour).padStart(2, '0');
        $min.textContent = String(minute).padStart(2, '0');
        $sec.textContent = String(second).padStart(2, '0');

        // 经络
        const info = getMeridianInfo(hour);
        $meridianMain.textContent = '⚡ ' + info.name;
        $advice.textContent = info.icon + ' ' + info.advice;

        // 网格高亮
        const cells = $grid.querySelectorAll('.cell');
        cells.forEach(cell => {
            cell.classList.toggle('active', cell.dataset.name === info.name);
        });

        // 修正信息
        $longOffset.textContent = (longitudeOffset >= 0 ? '+' : '') + longitudeOffset.toFixed(1) + 'min';
        $eotDisplay.textContent = (eot >= 0 ? '+' : '') + eot.toFixed(1) + 'min';
        $totalOffset.textContent = (totalOffset >= 0 ? '+' : '') + totalOffset.toFixed(1) + 'min';

        // 状态栏
        const source = isUsingGps ? 'GPS' : '手动';
        $statusMode.textContent = '📍 ' + source + ' · 经度 ' + currentLongitude.toFixed(2) + '°E';
        $statusTag.textContent = '真太阳时 第' + result.dayOfYear + '天';
    }

    // ============================================================
    // 设置定位状态
    // ============================================================
    function setLocationStatus(text, type, longitude) {
        $statusText.textContent = text;
        $statusDot.className = 'dot ' + type;
        if (longitude !== undefined) {
            $longitudeDisplay.textContent = longitude.toFixed(2) + '°E';
        }
        if (type === 'success') {
            $loadingOverlay.classList.add('hidden');
        }
    }

    // ============================================================
    // 启动时钟（修复版）
    // ============================================================
    function startClockWithLongitude(longitude, source) {
        currentLongitude = longitude;
        isUsingGps = (source === 'gps');
        setLocationStatus('已定位 · ' + longitude.toFixed(2) + '°E', 'success', longitude);

        // 立即更新一次
        updateUI();

        // 【修复】清除旧定时器，避免重复
        if (clockInterval) {
            clearInterval(clockInterval);
            clockInterval = null;
        }

        // 每秒更新
        clockInterval = setInterval(updateUI, 1000);
    }

    // ============================================================
    // GPS 定位
    // ============================================================
    function getLocationByGPS() {
        setLocationStatus('正在获取 GPS 位置...', 'loading');

        if (!navigator.geolocation) {
            setLocationStatus('浏览器不支持 GPS', 'error');
            showManualMode();
            return;
        }

        navigator.geolocation.getCurrentPosition(
            // 成功
            (position) => {
                const lon = position.coords.longitude;
                setLocationStatus('GPS 定位成功', 'success', lon);
                startClockWithLongitude(lon, 'gps');
            },
            // 失败
            (error) => {
                console.warn('GPS 定位失败:', error.message);
                setLocationStatus('GPS 失败，使用默认经度', 'error');
                const fallbackLon = parseFloat($manualLongitude.value) || 116.4;
                startClockWithLongitude(fallbackLon, 'manual');
                showManualMode();
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 60000
            }
        );
    }

    // ============================================================
    // 手动模式
    // ============================================================
    function showManualMode() {
        $manualRow.style.display = 'flex';
    }

    function applyManualLongitude() {
        const val = parseFloat($manualLongitude.value);
        if (isNaN(val) || val < -180 || val > 180) {
            alert('请输入有效经度（-180 ~ 180）');
            return;
        }
        startClockWithLongitude(val, 'manual');
        $manualRow.style.display = 'flex';
    }

    // ============================================================
    // 按钮事件绑定
    // ============================================================
    document.getElementById('btnAutoLocate').addEventListener('click', () => {
        getLocationByGPS();
    });

    document.getElementById('btnManualMode').addEventListener('click', () => {
        showManualMode();
        if (currentLongitude === null) {
            const val = parseFloat($manualLongitude.value) || 116.4;
            startClockWithLongitude(val, 'manual');
        }
    });

    document.getElementById('btnApplyManual').addEventListener('click', applyManualLongitude);

    $manualLongitude.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') applyManualLongitude();
    });

    // ============================================================
    // 初始化
    // ============================================================
    function init() {
        // 5秒后如果还没定位成功，自动降级
        setTimeout(() => {
            if (currentLongitude === null) {
                setLocationStatus('定位超时，使用默认经度', 'error');
                const defaultLon = parseFloat($manualLongitude.value) || 116.4;
                startClockWithLongitude(defaultLon, 'manual');
                showManualMode();
            }
        }, 5000);

        // 开始 GPS 定位
        getLocationByGPS();
    }

    // 页面加载完成后启动
    init();
</script>

</body>
</html>
