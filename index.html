<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>子午流注 · 真太阳时</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #EEF6F3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Noto Serif SC', 'SimSun', serif;
      padding: 16px;
    }
    .container {
      max-width: 420px;
      width: 100%;
      background: #F7FBF9;
      border-radius: 32px;
      padding: 20px 16px 24px;
      box-shadow: 0 8px 32px rgba(58,107,90,0.12);
      text-align: center;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 8px;
      color: #274D3E;
    }
    .header h1 span { color: #9C7C3C; }
    .gps-status {
      font-size: 12px;
      color: #6B8A7A;
      margin-top: 4px;
    }
    .gps-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #C8DDD8;
      margin-right: 6px;
      vertical-align: middle;
    }
    .gps-dot.ok { background: #3A6B5A; animation: pulse 2s infinite; }
    .gps-dot.err { background: #B04040; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .clock-wrap {
      width: 100%;
      max-width: 320px;
      margin: 12px auto 0;
      aspect-ratio: 1/1;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 50%;
      box-shadow: 0 4px 20px rgba(58,107,90,0.10);
    }
    .time-big {
      font-size: 36px;
      font-weight: 300;
      letter-spacing: 4px;
      color: #274D3E;
      margin-top: 12px;
    }
    .time-label {
      font-size: 11px;
      letter-spacing: 5px;
      color: #6B8A7A;
      margin-top: 2px;
    }
    .sc-card {
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(58,107,90,0.12);
      border-radius: 16px;
      padding: 12px 16px;
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
    }
    .sc-symbol {
      font-size: 40px;
      font-weight: 300;
      color: #3A6B5A;
      min-width: 48px;
      text-align: center;
    }
    .sc-info h2 {
      font-size: 15px;
      font-weight: 400;
      color: #274D3E;
      letter-spacing: 2px;
    }
    .sc-info .meridian {
      font-size: 12px;
      color: #5D8C7B;
      letter-spacing: 1px;
    }
    .sc-info .tip {
      font-size: 11px;
      color: #6B8A7A;
      margin-top: 3px;
    }
    .offset-bar {
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      margin-top: 12px;
      background: rgba(255,255,255,0.5);
      border-radius: 12px;
      border: 1px solid rgba(58,107,90,0.08);
    }
    .offset-bar span {
      font-size: 11px;
      color: #6B8A7A;
    }
    .offset-bar strong {
      display: block;
      font-size: 14px;
      font-weight: 400;
      color: #274D3E;
      margin-top: 2px;
    }
    .grid-title {
      font-size: 12px;
      color: #6B8A7A;
      letter-spacing: 6px;
      margin: 16px 0 10px;
      padding-top: 14px;
      border-top: 1px solid rgba(58,107,90,0.08);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }
    .grid-item {
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(58,107,90,0.08);
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
    }
    .grid-item.current {
      background: rgba(58,107,90,0.10);
      border-color: #3A6B5A;
    }
    .grid-item .glyph {
      font-size: 20px;
      font-weight: 300;
      color: #5D8C7B;
      min-width: 24px;
      text-align: center;
    }
    .grid-item.current .glyph { color: #274D3E; }
    .grid-item .gname {
      font-size: 12px;
      color: #3D5C4A;
      letter-spacing: 1px;
    }
    .grid-item .gtime {
      font-size: 10px;
      color: #6B8A7A;
      margin-left: auto;
      white-space: nowrap;
    }
    .grid-item .badge {
      font-size: 8px;
      background: #3A6B5A;
      color: #fff;
      padding: 1px 8px;
      border-radius: 4px;
      display: none;
      letter-spacing: 1px;
      margin-left: 4px;
    }
    .grid-item.current .badge { display: inline-block; }
    .footer {
      font-size: 10px;
      color: #6B8A7A;
      letter-spacing: 4px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(58,107,90,0.08);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>子午流注<span>·</span>真太阳时</h1>
    <div class="gps-status">
      <span class="gps-dot" id="gpsDot"></span>
      <span id="gpsText">定位中...</span>
    </div>
  </div>
  <div class="clock-wrap">
    <canvas id="clockCanvas" width="400" height="400"></canvas>
  </div>
  <div class="time-big" id="digitalTime">--:--:--</div>
  <div class="time-label" id="modeLabel">真太阳时</div>
  <div class="sc-card">
    <div class="sc-symbol" id="scSymbol">子</div>
    <div class="sc-info">
      <h2 id="scName">子时 · 胆经</h2>
      <div class="meridian" id="scMeridian">足少阳胆经当令</div>
      <div class="tip" id="scTip">宜深眠，胆汁排毒</div>
    </div>
  </div>
  <div class="offset-bar">
    <span>经度 <strong id="ofLon">--°</strong></span>
    <span>日差 <strong id="ofOffset">--分</strong></span>
    <span>时区 <strong id="ofZone">--</strong></span>
  </div>
  <div class="grid-title">— 十二时辰 · 子午流注 —</div>
  <div class="grid" id="shichenGrid"></div>
  <div class="footer">天人合一 · 顺时养生</div>
</div>

<script>
// ── 十二时辰数据 ──────────────────────────────────
const SHICHEN = [
  { idx:0,  glyph:'子', name:'子时', range:'23:00–01:00', hours:[23,0],  meridian:'足少阳胆经', tip:'宜深眠，胆汁排毒' },
  { idx:1,  glyph:'丑', name:'丑时', range:'01:00–03:00', hours:[1,2],   meridian:'足厥阴肝经', tip:'宜熟睡，养肝血' },
  { idx:2,  glyph:'寅', name:'寅时', range:'03:00–05:00', hours:[3,4],   meridian:'手太阴肺经', tip:'宜静卧，养肺气' },
  { idx:3,  glyph:'卯', name:'卯时', range:'05:00–07:00', hours:[5,6],   meridian:'手阳明大肠经', tip:'宜如厕，饮温水' },
  { idx:4,  glyph:'辰', name:'辰时', range:'07:00–09:00', hours:[7,8],   meridian:'足阳明胃经', tip:'宜早餐，养胃气' },
  { idx:5,  glyph:'巳', name:'巳时', range:'09:00–11:00', hours:[9,10],  meridian:'足太阴脾经', tip:'宜工作，运化旺' },
  { idx:6,  glyph:'午', name:'午时', range:'11:00–13:00', hours:[11,12], meridian:'手少阴心经', tip:'宜小憩，养心神' },
  { idx:7,  glyph:'未', name:'未时', range:'13:00–15:00', hours:[13,14], meridian:'手太阳小肠经', tip:'宜轻活，助消化' },
  { idx:8,  glyph:'申', name:'申时', range:'15:00–17:00', hours:[15,16], meridian:'足太阳膀胱经', tip:'宜饮水，可锻炼' },
  { idx:9,  glyph:'酉', name:'酉时', range:'17:00–19:00', hours:[17,18], meridian:'足少阴肾经', tip:'宜休息，收藏精' },
  { idx:10, glyph:'戌', name:'戌时', range:'19:00–21:00', hours:[19,20], meridian:'手厥阴心包经', tip:'宜散步，勿激动' },
  { idx:11, glyph:'亥', name:'亥时', range:'21:00–23:00', hours:[21,22], meridian:'手少阳三焦经', tip:'宜入睡，百脉养' }
];

function getShichen(h) {
  if (h === 23) return SHICHEN[0];
  for (const sc of SHICHEN) {
    if (sc.hours.includes(h)) return sc;
  }
  return SHICHEN[0];
}

// ── 状态 ──────────────────────────────────────────
let userLon = null;
let solarOffsetMin = 0;
let mode = 'solar';

// ── GPS ──────────────────────────────────────────
function requestGPS() {
  if (!navigator.geolocation) {
    setGPS('err', '不支持GPS');
    userLon = 120;
    computeOffset();
    return;
  }
  navigator.geolocation.getCurrentPosition(onGPS, onGPSErr, {
    enableHighAccuracy: true,
    timeout: 15000,
    maximumAge: 60000
  });
}

function onGPS(pos) {
  userLon = pos.coords.longitude;
  computeOffset();
  setGPS('ok', pos.coords.latitude.toFixed(1) + '°N');
  document.getElementById('ofLon').textContent = userLon.toFixed(2) + '°';
  const tz = -(new Date().getTimezoneOffset() / 60);
  document.getElementById('ofZone').textContent = 'UTC+' + tz;
}

function onGPSErr(err) {
  let msg = '定位失败';
  if (err.code === 1) msg = '权限被拒';
  else if (err.code === 2) msg = '信号弱';
  else if (err.code === 3) msg = '定位超时';
  setGPS('err', msg);
  userLon = 120;
  computeOffset();
  document.getElementById('ofLon').textContent = '120.00°';
}

function setGPS(s, t) {
  const dot = document.getElementById('gpsDot');
  dot.className = 'gps-dot ' + (s === 'ok' ? 'ok' : s === 'err' ? 'err' : '');
  document.getElementById('gpsText').textContent = t;
}

// ── 真太阳时算法 ──────────────────────────────────
function computeOffset() {
  const now = new Date();
  const tzMin = -now.getTimezoneOffset();
  const central = (tzMin / 60) * 15;
  const lonCorr = (userLon - central) * 4;
  const doy = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
  const B = (360 / 365 * (doy - 81)) * Math.PI / 180;
  const EoT = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
  solarOffsetMin = lonCorr + EoT;
  const sign = solarOffsetMin >= 0 ? '+' : '';
  document.getElementById('ofOffset').textContent = sign + solarOffsetMin.toFixed(1) + '分';
}

function getSolarTime() {
  return new Date(Date.now() + solarOffsetMin * 60000);
}

function getDisplayTime() {
  return mode === 'solar' ? getSolarTime() : new Date();
}

// ── 表盘绘制 ──────────────────────────────────────
const canvas = document.getElementById('clockCanvas');
const ctx = canvas.getContext('2d');
const cx = 200, cy = 200, R = 185;

// ── 圈层半径定义 ──────────────────────────────────
const NUM_R1 = 32;
const NUM_R2 = 72;
const INNER_R1 = 80;
const INNER_R2 = 122;
const OUTER_R1 = 130;
const OUTER_R2 = 175;
const EDGE_R = 185;

// ── 指针长度 ──
const HOUR_LEN = 28;
const MIN_LEN  = 45;
const SEC_LEN  = 55;

// ── 角度数据（Canvas中 0°=3点钟，-90°=12点钟） ──
const ANGLE_DATA = [
  // 内圈：子丑寅卯辰巳
  { label: '子', startDeg: -120, endDeg: -60, inner: true },   // 11:00~1:00
  { label: '丑', startDeg: -60, endDeg: 0, inner: true },      // 1:00~3:00
  { label: '寅', startDeg: 0, endDeg: 60, inner: true },       // 3:00~5:00
  { label: '卯', startDeg: 60, endDeg: 120, inner: true },     // 5:00~7:00
  { label: '辰', startDeg: 120, endDeg: 180, inner: true },    // 7:00~9:00
  { label: '巳', startDeg: 180, endDeg: 240, inner: true },    // 9:00~11:00
  // 外圈：午未申酉戌亥（与内圈完全对齐）
  { label: '午', startDeg: -120, endDeg: -60, inner: false },  // 11:00~1:00
  { label: '未', startDeg: -60, endDeg: 0, inner: false },     // 1:00~3:00
  { label: '申', startDeg: 0, endDeg: 60, inner: false },      // 3:00~5:00
  { label: '酉', startDeg: 60, endDeg: 120, inner: false },    // 5:00~7:00
  { label: '戌', startDeg: 120, endDeg: 180, inner: false },   // 7:00~9:00
  { label: '亥', startDeg: 180, endDeg: 240, inner: false }    // 9:00~11:00
];

function getCurrentAngleIndex(h) {
  if (h >= 23 || h < 1) return 0;
  if (h >= 1 && h < 3) return 1;
  if (h >= 3 && h < 5) return 2;
  if (h >= 5 && h < 7) return 3;
  if (h >= 7 && h < 9) return 4;
  if (h >= 9 && h < 11) return 5;
  if (h >= 11 && h < 13) return 6;
  if (h >= 13 && h < 15) return 7;
  if (h >= 15 && h < 17) return 8;
  if (h >= 17 && h < 19) return 9;
  if (h >= 19 && h < 21) return 10;
  if (h >= 21 && h < 23) return 11;
  return 0;
}

function drawClock(t) {
  ctx.clearRect(0, 0, 400, 400);
  const h = t.getHours();
  const m = t.getMinutes();
  const s = t.getSeconds();

  // ── 表盘底色 ──
  ctx.beginPath();
  ctx.arc(cx, cy, EDGE_R, 0, Math.PI * 2);
  ctx.fillStyle = '#F7FBF9';
  ctx.fill();
  ctx.strokeStyle = 'rgba(58,107,90,0.15)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  const currentIdx = getCurrentAngleIndex(h);

  // ── 绘制时辰扇区 ──
  for (let i = 0; i < ANGLE_DATA.length; i++) {
    const sc = ANGLE_DATA[i];
    const isActive = (i === currentIdx);
    const isInner = sc.inner;

    const sa = sc.startDeg * Math.PI / 180;
    const ea = sc.endDeg * Math.PI / 180;
    const r1 = isInner ? INNER_R1 : OUTER_R1;
    const r2 = isInner ? INNER_R2 : OUTER_R2;

    ctx.beginPath();
    ctx.moveTo(cx + r1 * Math.cos(sa), cy + r1 * Math.sin(sa));
    ctx.arc(cx, cy, r1, sa, ea, false);
    ctx.arc(cx, cy, r2, ea, sa, true);
    ctx.closePath();

    if (isActive) {
      ctx.fillStyle = 'rgba(58,107,90,0.20)';
    } else {
      ctx.fillStyle = (i % 2 === 0) ? 'rgba(200,221,216,0.12)' : 'rgba(234,243,238,0.06)';
    }
    ctx.fill();
    ctx.strokeStyle = 'rgba(58,107,90,0.08)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // 时辰字
    const midDeg = (sc.startDeg + sc.endDeg) / 2;
    const midRad = midDeg * Math.PI / 180;
    const labelR = (r1 + r2) / 2;

    ctx.save();
    ctx.translate(cx + labelR * Math.cos(midRad), cy + labelR * Math.sin(midRad));
    ctx.rotate(midRad + Math.PI / 2);
    ctx.font = `${isInner ? 16 : 22}px 'Noto Serif SC', serif`;
    ctx.fillStyle = isActive ? '#274D3E' : '#6B8A7A';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(sc.label, 0, 0);
    ctx.restore();
  }

  // ── 分隔线 ──
  ctx.beginPath();
  ctx.arc(cx, cy, INNER_R2, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(58,107,90,0.15)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // ── 外圈边缘线 ──
  ctx.beginPath();
  ctx.arc(cx, cy, OUTER_R2, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(58,107,90,0.10)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // ── 1-12 数字 ──
  for (let i = 1; i <= 12; i++) {
    const deg = i * 30 - 90;
    const rad = deg * Math.PI / 180;
    const nr = (NUM_R1 + NUM_R2) / 2;
    ctx.font = '15px "Noto Serif SC", serif';
    ctx.fillStyle = '#3D5C4A';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i, cx + nr * Math.cos(rad), cy + nr * Math.sin(rad));
  }

  // ── 中心太极 ──
  ctx.font = '22px serif';
  ctx.fillStyle = 'rgba(58,107,90,0.15)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('☯', cx, cy);

  // ── 时针（最短、最粗，深绿色） ──
  const hAngle = ((h % 12) * 30 + m * 0.5 - 90) * Math.PI / 180;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(hAngle);
  ctx.beginPath();
  ctx.moveTo(-6, 0);
  ctx.lineTo(HOUR_LEN, 0);
  ctx.strokeStyle = '#274D3E';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  // ── 分针（中等，墨绿色） ──
  const mAngle = (m * 6 + s * 0.1 - 90) * Math.PI / 180;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(mAngle);
  ctx.beginPath();
  ctx.moveTo(-5, 0);
  ctx.lineTo(MIN_LEN, 0);
  ctx.strokeStyle = '#3A6B5A';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  // ── 秒针（最长、最细，红色） ──
  const sAngle = (s * 6 - 90) * Math.PI / 180;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(sAngle);
  ctx.beginPath();
  ctx.moveTo(-8, 0);
  ctx.lineTo(SEC_LEN, 0);
  ctx.strokeStyle = '#B04040';
  ctx.lineWidth = 1.2;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  // ── 中心装饰 ──
  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#274D3E';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#B04040';
  ctx.fill();
}

// ── 数字时间 ──────────────────────────────────────
function updateDigital(t) {
  const hh = String(t.getHours()).padStart(2, '0');
  const mm = String(t.getMinutes()).padStart(2, '0');
  const ss = String(t.getSeconds()).padStart(2, '0');
  document.getElementById('digitalTime').textContent = hh + ':' + mm + ':' + ss;
}

// ── 时辰卡片 ──────────────────────────────────────
function updateShichenCard(h) {
  const sc = getShichen(h);
  document.getElementById('scSymbol').textContent = sc.glyph;
  document.getElementById('scName').textContent = sc.name + ' · ' + sc.meridian;
  document.getElementById('scMeridian').textContent = sc.meridian + '当令';
  document.getElementById('scTip').textContent = sc.tip;
}

// ── 流注表 ──────────────────────────────────────
function buildGrid() {
  const g = document.getElementById('shichenGrid');
  g.innerHTML = '';
  SHICHEN.forEach(sc => {
    const d = document.createElement('div');
    d.className = 'grid-item';
    d.id = 'sc-' + sc.idx;
    d.innerHTML = `
      <div class="glyph">${sc.glyph}</div>
      <div class="gname">${sc.name}</div>
      <div class="gtime">${sc.range}</div>
      <div class="badge">当前</div>
    `;
    g.appendChild(d);
  });
}

let lastIdx = -1;
function updateGrid(h) {
  const sc = getShichen(h);
  if (sc.idx === lastIdx) return;
  lastIdx = sc.idx;
  document.querySelectorAll('.grid-item').forEach(el => el.classList.remove('current'));
  const el = document.getElementById('sc-' + sc.idx);
  if (el) { el.classList.add('current'); }
}

// ── 主循环 ──────────────────────────────────────
function tick() {
  const t = getDisplayTime();
  drawClock(t);
  updateDigital(t);
  updateShichenCard(t.getHours());
  updateGrid(t.getHours());
}

// ── 启动 ──────────────────────────────────────────
buildGrid();
requestGPS();
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
