<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>子午流注 · 真太阳时</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #F5EDE4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: #FDF8F2;
            border-radius: 28px;
            padding: 24px 20px 28px;
            box-shadow: 0 8px 40px rgba(139, 0, 0, 0.12);
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '☯';
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 80px;
            opacity: 0.06;
            transform: rotate(15deg);
        }
        .header {
            text-align: center;
            padding-bottom: 14px;
            border-bottom: 2px solid #E8D5C0;
            margin-bottom: 18px;
        }
        .header h1 {
            font-size: 22px;
            color: #6B2E1A;
            letter-spacing: 6px;
            font-weight: 700;
        }
        .header .sub {
            font-size: 12px;
            color: #A0806A;
            margin-top: 2px;
        }
        .location-status {
            text-align: center;
            font-size: 12px;
            color: #8B6914;
            background: #F5EDE4;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin: 0 auto 12px;
            width: auto;
        }
        .location-status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .location-status .dot.success {
            background: #2E7D32;
        }
        .location-status .dot.loading {
            background: #F9A825;
            animation: blink 1s infinite;
        }
        .location-status .dot.error {
            background: #C62828;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        .location-status .longitude-display {
            font-weight: 600;
            color: #4A2A1A;
        }
        .center-display {
            text-align: center;
            padding: 8px 0 16px;
            position: relative;
        }
        .center-display .time {
            font-size: 56px;
            font-weight: 700;
            color: #3D2012;
            letter-spacing: 4px;
            font-variant-numeric: tabular-nums;
            line-height: 1.1;
        }
        .center-display .time .seconds {
            font-size: 20px;
            color: #B8860B;
            font-weight: 400;
            margin-left: 4px;
        }
        .center-display .time .label-true {
            font-size: 12px;
            color: #8B1A1A;
            font-weight: 400;
            margin-left: 8px;
            background: #F5EDE4;
            padding: 0 10px;
            border-radius: 12px;
        }
        .center-display .meridian-main {
            font-size: 28px;
            color: #8B1A1A;
            font-weight: 700;
            margin-top: 2px;
            background: #F5EDE4;
            display: inline-block;
            padding: 2px 24px;
            border-radius: 30px;
            letter-spacing: 2px;
        }
        .center-display .advice {
            font-size: 14px;
            color: #A0806A;
            margin-top: 4px;
            letter-spacing: 1px;
        }
        .center-display .advice span {
            background: #EDE3D8;
            padding: 1px 14px;
            border-radius: 12px;
        }
        .correction-info {
            display: flex;
            justify-content: center;
            gap: 16px;
            font-size: 11px;
            color: #A0806A;
            margin: 6px 0 12px;
            flex-wrap: wrap;
        }
        .correction-info .item {
            background: #F5EDE4;
            padding: 2px 12px;
            border-radius: 12px;
        }
        .correction-info .item .val {
            font-weight: 600;
            color: #5A3E2B;
        }
        .ring-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin: 12px 0 16px;
            padding: 8px;
            background: #F5EDE4;
            border-radius: 20px;
            position: relative;
        }
        .ring-grid::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #FDF8F2;
            border: 2px solid #DCC8B6;
            pointer-events: none;
            box-shadow: 0 0 0 4px #F5EDE4;
        }
        .cell {
            background: #FDF8F2;
            border-radius: 10px;
            padding: 8px 2px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.4s ease;
            cursor: default;
            position: relative;
            z-index: 1;
        }
        .cell .hour-label {
            font-size: 10px;
            color: #B09880;
            font-weight: 500;
        }
        .cell .name {
            font-size: 14px;
            font-weight: 600;
            color: #5A3E2B;
            margin-top: 1px;
            transition: color 0.3s;
        }
        .cell .icon {
            font-size: 12px;
        }
        .cell.active {
            background: #FFD700;
            border-color: #B8860B;
            transform: scale(1.04);
            box-shadow: 0 2px 16px rgba(255, 215, 0, 0.45);
        }
        .cell.active .name {
            color: #6B1A1A;
        }
        .cell.active .hour-label {
            color: #8B6914;
        }
        .controls {
            background: #F5EDE4;
            border-radius: 16px;
            padding: 14px 16px;
            margin: 4px 0 12px;
        }
        .controls .row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }
        .controls .row:last-child {
            margin-bottom: 0;
        }
        .controls label {
            font-size: 13px;
            color: #5A3E2B;
            font-weight: 500;
        }
        .btn {
            background: #DCC8B6;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            color: #3D2012;
            transition: all 0.15s;
            min-width: 40px;
            touch-action: manipulation;
            user-select: none;
        }
        .btn:active {
            transform: scale(0.92);
            background: #C8B4A0;
        }
        .btn-primary {
            background: #8B1A1A;
            color: #fff;
        }
        .btn-primary:active {
            background: #6B1414;
        }
        .btn-secondary {
            background: #B8A99A;
            color: #fff;
        }
        .btn-secondary:active {
            background: #A09080;
        }
        .btn-success {
            background: #2E7D32;
            color: #fff;
        }
        .btn-success:active {
            background: #1B5E20;
        }
        .manual-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .manual-row input {
            padding: 4px 8px;
            border-radius: 8px;
            border: 1.5px solid #DCC8B6;
            font-size: 16px;
            background: #fff;
            width: 80px;
            text-align: center;
            color: #3D2012;
            font-weight: 600;
        }
        .manual-row input:focus {
            outline: none;
            border-color: #8B1A1A;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #A0806A;
            padding: 4px 2px 0;
            border-top: 1px solid #EDE3D8;
            margin-top: 8px;
            padding-top: 8px;
            flex-wrap: wrap;
            gap: 4px;
        }
        .status-bar .mode {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .status-bar .tag {
            background: #EDE3D8;
            padding: 0 10px;
            border-radius: 10px;
            font-size: 10px;
            color: #6B4E3A;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(253, 248, 242, 0.92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.6s ease;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-overlay .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #E8D5C0;
            border-top-color: #8B1A1A;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-overlay p {
            margin-top: 16px;
            color: #5A3E2B;
            font-size: 14px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        @media (max-width: 400px) {
            .container {
                padding: 16px 12px 20px;
            }
            .center-display .time {
                font-size: 42px;
            }
            .center-display .meridian-main {
                font-size: 22px;
            }
            .cell .name {
                font-size: 12px;
            }
            .correction-info {
                font-size: 10px;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>📍 正在通过 GPS 定位...</p>
        <p style="font-size:12px;color:#999;margin-top:8px;">请允许位置权限</p>
    </div>

    <div class="container" id="app">
        <div class="header">
            <h1>☯ 子午流注</h1>
            <div class="sub">真太阳时 · 天人相应</div>
        </div>

        <div style="text-align:center;">
            <div class="location-status" id="locationStatus">
                <span class="dot loading" id="statusDot"></span>
                <span id="statusText">正在通过 GPS 定位...</span>
                <span class="longitude-display" id="longitudeDisplay"></span>
            </div>
        </div>

        <div class="center-display">
            <div class="time">
                <span id="hourDisplay">--</span>:<span id="minDisplay">--</span>
                <span class="seconds" id="secDisplay">--</span>
                <span class="label-true">真太阳时</span>
            </div>
            <div class="meridian-main" id="meridianMain">--</div>
            <div class="advice"><span id="adviceText">🌿 养生指南</span></div>
        </div>

        <div class="correction-info" id="correctionInfo">
            <span class="item">📍 经度: <span class="val" id="displayLongitude">--</span></span>
            <span class="item">经度修正: <span class="val" id="longOffsetDisplay">--</span></span>
            <span class="item">均时差: <span class="val" id="eotDisplay">--</span></span>
        </div>

        <div class="ring-grid" id="ringGrid"></div>

        <div class="controls" id="controlsPanel">
            <div class="row">
                <label>📍 定位模式</label>
                <button class="btn btn-success" id="btnAutoLocate">GPS 定位</button>
                <button class="btn btn-secondary" id="btnManualMode">手动输入经度</button>
            </div>
            <div class="manual-row" id="manualRow" style="display:none;">
                <label>经度: </label>
                <input type="number" id="manualLongitude" value="174.8" step="0.01">
                <span style="color:#5A3E2B;">°E</span>
                <button class="btn btn-primary" id="btnApplyManual">应用</button>
            </div>
        </div>

        <div class="status-bar">
            <span class="mode" id="statusMode">📍 真太阳时模式</span>
            <span class="tag" id="statusTag">实时更新</span>
        </div>
    </div>

    <script>
        // ============================================================
        // 十二经络数据
        // ============================================================
        const MERIDIANS = [
            { hour: 23, name: '胆经', icon: '🌙', advice: '宜入睡' },
            { hour: 1, name: '肝经', icon: '💤', advice: '熟睡养肝' },
            { hour: 3, name: '肺经', icon: '🌅', advice: '深睡养肺' },
            { hour: 5, name: '大肠经', icon: '🚽', advice: '宜排便' },
            { hour: 7, name: '胃经', icon: '🍳', advice: '吃早餐' },
            { hour: 9, name: '脾经', icon: '💪', advice: '效率高峰' },
            { hour: 11, name: '心经', icon: '🧠', advice: '精神饱满' },
            { hour: 13, name: '小肠经', icon: '🥗', advice: '午餐时间' },
            { hour: 15, name: '膀胱经', icon: '💧', advice: '多喝水' },
            { hour: 17, name: '肾经', icon: '🌆', advice: '收藏精气' },
            { hour: 19, name: '心包经', icon: '❤️', advice: '放松心情' },
            { hour: 21, name: '三焦经', icon: '🛀', advice: '准备入睡' }
        ];

        // ============================================================
        // 状态
        // ============================================================
        let currentLongitude = null;
        let isUsingGps = false;
        let clockInterval = null;

        // ============================================================
        // DOM
        // ============================================================
        const $hour = document.getElementById('hourDisplay');
        const $min = document.getElementById('minDisplay');
        const $sec = document.getElementById('secDisplay');
        const $meridianMain = document.getElementById('meridianMain');
        const $advice = document.getElementById('adviceText');
        const $grid = document.getElementById('ringGrid');
        const $statusMode = document.getElementById('statusMode');
        const $statusTag = document.getElementById('statusTag');
        const $longOffset = document.getElementById('longOffsetDisplay');
        const $eotDisplay = document.getElementById('eotDisplay');
        const $displayLongitude = document.getElementById('displayLongitude');
        const $longitudeDisplay = document.getElementById('longitudeDisplay');
        const $statusText = document.getElementById('statusText');
        const $statusDot = document.getElementById('statusDot');
        const $loadingOverlay = document.getElementById('loadingOverlay');
        const $manualRow = document.getElementById('manualRow');
        const $manualLongitude = document.getElementById('manualLongitude');

        // ============================================================
        // 构建经络网格
        // ============================================================
        function buildGrid() {
            $grid.innerHTML = '';
            MERIDIANS.forEach((m) => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.dataset.name = m.name;
                const hourStr = String(m.hour).padStart(2, '0') + ':00';
                div.innerHTML =
                    `<div class="hour-label">${hourStr}</div><div class="icon">${m.icon}</div><div class="name">${m.name}</div>`;
                $grid.appendChild(div);
            });
        }
        buildGrid();

        // ============================================================
        // 均时差（精确版）
        // ============================================================
        function equationOfTime(dayOfYear) {
            const B = (360.0 / 365.0) * (dayOfYear - 81);
            const BRad = B * Math.PI / 180;
            return 9.87 * Math.sin(2 * BRad) - 7.53 * Math.cos(BRad) - 1.5 * Math.sin(BRad);
        }

        // ============================================================
        // 核心：根据经度计算真太阳时
        // 从 UTC 时间 + 经度修正 + 均时差修正
        // ============================================================
        function calculateTrueSolarTime(longitude) {
            const now = new Date();

            // UTC 时间
            const utcH = now.getUTCHours();
            const utcM = now.getUTCMinutes();
            const utcS = now.getUTCSeconds();

            // 一年中的第几天
            const startOfYear = new Date(now.getFullYear(), 0, 1);
            const dayOfYear = Math.floor((now - startOfYear) / 86400000) + 1;

            // 经度修正：从 0° 基准线开始，每度 4 分钟
            const lonOffset = longitude * 4.0;

            // 均时差修正
            const eot = equationOfTime(dayOfYear);

            // 总修正
            const totalOffset = lonOffset + eot;

            // 应用到 UTC
            let totalMinutes = utcH * 60 + utcM + totalOffset;
            let h = Math.floor(totalMinutes / 60) % 24;
            let m = Math.round(totalMinutes % 60);

            if (m >= 60) { m -= 60;
                h = (h + 1) % 24; }
            if (m < 0) { m += 60;
                h = (h - 1 + 24) % 24; }
            if (h < 0) h += 24;

            return {
                hour: h,
                minute: m,
                second: utcS,
                lonOffset: lonOffset,
                eot: eot,
                totalOffset: totalOffset,
                dayOfYear: dayOfYear,
                longitude: longitude
            };
        }

        // ============================================================
        // 获取经络
        // ============================================================
        function getMeridianInfo(hour) {
            if (hour === 23 || hour === 0) return MERIDIANS[0];
            for (const m of MERIDIANS) {
                if (hour >= m.hour && hour < m.hour + 2) {
                    return m;
                }
            }
            return MERIDIANS[0];
        }

        // ============================================================
        // 更新 UI
        // ============================================================
        function updateUI() {
            if (currentLongitude === null) {
                return;
            }

            const r = calculateTrueSolarTime(currentLongitude);
            const { hour, minute, second, lonOffset, eot, totalOffset, longitude } = r;

            $hour.textContent = String(hour).padStart(2, '0');
            $min.textContent = String(minute).padStart(2, '0');
            $sec.textContent = String(second).padStart(2, '0');

            const info = getMeridianInfo(hour);
            $meridianMain.textContent = '⚡ ' + info.name;
            $advice.textContent = info.icon + ' ' + info.advice;

            const cells = $grid.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.classList.toggle('active', cell.dataset.name === info.name);
            });

            $displayLongitude.textContent = longitude.toFixed(2) + '°E';
            $longOffset.textContent = (lonOffset >= 0 ? '+' : '') + lonOffset.toFixed(1) + 'min';
            $eotDisplay.textContent = (eot >= 0 ? '+' : '') + eot.toFixed(1) + 'min';

            const source = isUsingGps ? 'GPS' : '手动';
            $statusMode.textContent = '📍 ' + source + ' · 经度 ' + currentLongitude.toFixed(2) + '°E';
            $statusTag.textContent = '真太阳时';
        }

        // ============================================================
        // 启动时钟
        // ============================================================
        function startClockWithLongitude(longitude, source) {
            currentLongitude = longitude;
            isUsingGps = (source === 'gps');

            $statusDot.className = 'dot success';
            $statusText.textContent = 'GPS 定位成功 · ' + longitude.toFixed(2) + '°E';
            $longitudeDisplay.textContent = longitude.toFixed(2) + '°E';
            $loadingOverlay.classList.add('hidden');

            if (clockInterval) {
                clearInterval(clockInterval);
                clockInterval = null;
            }

            updateUI();
            clockInterval = setInterval(updateUI, 1000);
        }

        // ============================================================
        // GPS 定位
        // ============================================================
        function getLocationByGPS() {
            $statusDot.className = 'dot loading';
            $statusText.textContent = '正在通过 GPS 定位...';
            $loadingOverlay.classList.remove('hidden');

            if (!navigator.geolocation) {
                $statusDot.className = 'dot error';
                $statusText.textContent = '浏览器不支持 GPS，请手动输入经度';
                $loadingOverlay.classList.add('hidden');
                showManualMode();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lon = position.coords.longitude;
                    startClockWithLongitude(lon, 'gps');
                },
                (error) => {
                    console.warn('GPS 定位失败:', error.message);
                    $statusDot.className = 'dot error';
                    $statusText.textContent = 'GPS 定位失败，请手动输入经度';
                    $loadingOverlay.classList.add('hidden');
                    showManualMode();
                }, {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 60000
                }
            );
        }

        // ============================================================
        // 手动模式
        // ============================================================
        function showManualMode() {
            $manualRow.style.display = 'flex';
        }

        function applyManualLongitude() {
            const val = parseFloat($manualLongitude.value);
            if (isNaN(val) || val < -180 || val > 180) {
                alert('请输入有效经度（-180 ~ 180）');
                return;
            }
            startClockWithLongitude(val, 'manual');
            $manualRow.style.display = 'flex';
        }

        // ============================================================
        // 按钮绑定
        // ============================================================
        document.getElementById('btnAutoLocate').addEventListener('click', getLocationByGPS);

        document.getElementById('btnManualMode').addEventListener('click', () => {
            showManualMode();
            if (currentLongitude === null) {
                const val = parseFloat($manualLongitude.value) || 174.8;
                startClockWithLongitude(val, 'manual');
            }
        });

        document.getElementById('btnApplyManual').addEventListener('click', applyManualLongitude);

        $manualLongitude.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') applyManualLongitude();
        });

        // ============================================================
        // 初始化
        // ============================================================
        function init() {
            $manualLongitude.value = '174.8';

            // 8秒超时降级
            setTimeout(() => {
                if (currentLongitude === null) {
                    $statusDot.className = 'dot error';
                    $statusText.textContent = 'GPS 定位超时，请手动输入经度';
                    $loadingOverlay.classList.add('hidden');
                    showManualMode();
                }
            }, 8000);

            getLocationByGPS();
        }

        init();
    </script>

</body>
</html>
