  // 天干地支
  tianGan: ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'],
  diZhi: ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'],
  shengXiao: ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'],

  // 农历月名
  monthNames: ['正','二','三','四','五','六','七','八','九','十','冬','腊'],
  dayNames: ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
             '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
             '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'],

  // 获取农历年份的月信息
  getLunarYearInfo: function(year) {
    var info = this.lunarInfo[year - 1900];
    var months = [];
    for (var i = 0; i < 12; i++) {
      months.push((info & (1 << (11 - i))) ? 30 : 29);
    }
    var leapMonth = info & 0xF;
    return { months: months, leapMonth: leapMonth };
  },

  // 计算农历日期
  getLunarDate: function(date) {
    var year = date.getFullYear();
    var month = date.getMonth() + 1;
    var day = date.getDate();

    var baseDate = new Date(1900, 0, 31);
    var targetDate = new Date(year, month - 1, day);
    var offset = Math.floor((targetDate - baseDate) / 86400000);

    var lunarYear = 1900;
    var lunarMonth = 1;
    var lunarDay = 1;
    var leapMonth = 0;
    var isLeapMonth = false;

    for (var y = 1900; y < 2100; y++) {
      var info = this.getLunarYearInfo(y);
      var totalDays = 0;
      for (var m = 0; m < 12; m++) {
        totalDays += info.months[m];
      }
      if (info.leapMonth > 0) {
        var leapDays = (info.months[info.leapMonth - 1] === 30) ? 30 : 29;
        totalDays += leapDays;
      }
      if (offset >= totalDays) {
        offset -= totalDays;
        lunarYear = y + 1;
      } else {
        lunarYear = y;
        break;
      }
    }

    var info = this.getLunarYearInfo(lunarYear);
    var monthDays = info.months.slice();
    var leapMonthIdx = info.leapMonth;

    for (var m = 0; m < 12; m++) {
      if (offset >= monthDays[m]) {
        offset -= monthDays[m];
      } else {
        lunarMonth = m + 1;
        lunarDay = offset + 1;
        break;
      }
      if (leapMonthIdx > 0 && m === leapMonthIdx - 1) {
        var leapDays = (monthDays[m] === 30) ? 30 : 29;
        if (offset >= leapDays) {
          offset -= leapDays;
        } else {
          lunarMonth = m + 1;
          lunarDay = offset + 1;
          isLeapMonth = true;
          break;
        }
      }
    }

    return {
      year: lunarYear,
      month: lunarMonth,
      day: lunarDay,
      isLeap: isLeapMonth,
      monthName: this.monthNames[lunarMonth - 1],
      dayName: this.dayNames[lunarDay - 1]
    };
  },

  // 获取年干支
  getYearGanZhi: function(year) {
    var gan = this.tianGan[(year - 4) % 10];
    var zhi = this.diZhi[(year - 4) % 12];
    return gan + zhi;
  },

  // 获取生肖
  getShengXiao: function(year) {
    return this.shengXiao[(year - 4) % 12];
  },

  // 获取月干支（五虎遁）
  // 正月寅月，二月卯月，以此类推
  getMonthGanZhi: function(year, lunarMonth) {
    // 年干序号（甲=0, 乙=1, ..., 癸=9）
    var yearGanIndex = (year - 4) % 10;
    // 农历月 → 月支（正月=寅=2, 二月=卯=3, ..., 十一月=子=0, 十二月=丑=1）
    var diZhiIndex = (lunarMonth + 1) % 12;
    var monthZhi = this.diZhi[diZhiIndex];
    // 月干 = (年干序号 × 2 + 月支序号) % 10
    var ganIndex = (yearGanIndex * 2 + diZhiIndex) % 10;
    var monthGan = this.tianGan[ganIndex];
    return monthGan + monthZhi;
  },

  // 获取日干支（从1900-01-31推算）
  getDayGanZhi: function(date) {
    var base = new Date(1900, 0, 31);
    var offset = Math.floor((date - base) / 86400000);
    var gan = this.tianGan[(offset + 10) % 10];
    var zhi = this.diZhi[(offset + 0) % 12];
    return gan + zhi;
  }
};

function getShichen(h) {
  if (h === 23) return SHICHEN[0];
  for (var i = 0; i < SHICHEN.length; i++) {
    var sc = SHICHEN[i];
    if (sc.hours.indexOf(h) !== -1) return sc;
  }
  return SHICHEN[0];
}

// ============================================================
// 状态
// ============================================================
var userLon = null;
var solarOffsetMin = 0;
var mode = 'solar';

// ============================================================
// GPS
// ============================================================
function requestGPS() {
  if (!navigator.geolocation) {
    setGPS('err', '不支持GPS');
    userLon = 120;
    computeOffset();
    return;
  }
  navigator.geolocation.getCurrentPosition(onGPS, onGPSErr, {
    enableHighAccuracy: true,
    timeout: 15000,
    maximumAge: 60000
  });
}

function onGPS(pos) {
  userLon = pos.coords.longitude;
  computeOffset();
  setGPS('ok', pos.coords.latitude.toFixed(1) + '°N');
  document.getElementById('ofLon').textContent = userLon.toFixed(2) + '°';
  var tz = -(new Date().getTimezoneOffset() / 60);
  document.getElementById('ofZone').textContent = 'UTC+' + tz;
}

function onGPSErr(err) {
  var msg = '定位失败';
  if (err.code === 1) msg = '权限被拒';
  else if (err.code === 2) msg = '信号弱';
  else if (err.code === 3) msg = '定位超时';
  setGPS('err', msg);
  userLon = 120;
  computeOffset();
  document.getElementById('ofLon').textContent = '120.00°';
}

function setGPS(s, t) {
  var dot = document.getElementById('gpsDot');
  dot.className = 'gps-dot ' + (s === 'ok' ? 'ok' : s === 'err' ? 'err' : '');
  document.getElementById('gpsText').textContent = t;
}

// ============================================================
// 真太阳时算法
// ============================================================
function computeOffset() {
  var now = new Date();
  var tzMin = -now.getTimezoneOffset();
  var central = (tzMin / 60) * 15;
  var lonCorr = (userLon - central) * 4;
  var doy = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
  var B = (360 / 365 * (doy - 81)) * Math.PI / 180;
  var EoT = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
  solarOffsetMin = lonCorr + EoT;
  var sign = solarOffsetMin >= 0 ? '+' : '';
  document.getElementById('ofOffset').textContent = sign + solarOffsetMin.toFixed(1) + '分';
}

function getSolarTime() {
  return new Date(Date.now() + solarOffsetMin * 60000);
}

function getDisplayTime() {
  return mode === 'solar' ? getSolarTime() : new Date();
}

// ============================================================
// 表盘绘制
// ============================================================
var canvas = document.getElementById('clockCanvas');
var ctx = canvas.getContext('2d');
var cx = 200, cy = 200, R = 185;

var NUM_R1 = 32;
var NUM_R2 = 72;
var INNER_R1 = 80;
var INNER_R2 = 122;
var OUTER_R1 = 130;
var OUTER_R2 = 175;
var EDGE_R = 185;

var HOUR_LEN = 28;
var MIN_LEN  = 45;
var SEC_LEN  = 55;

var ANGLE_DATA = [
  { label: '子', startDeg: -120, endDeg: -60, inner: true },
  { label: '丑', startDeg: -60, endDeg: 0, inner: true },
  { label: '寅', startDeg: 0, endDeg: 60, inner: true },
  { label: '卯', startDeg: 60, endDeg: 120, inner: true },
  { label: '辰', startDeg: 120, endDeg: 180, inner: true },
  { label: '巳', startDeg: 180, endDeg: 240, inner: true },
  { label: '午', startDeg: -120, endDeg: -60, inner: false },
  { label: '未', startDeg: -60, endDeg: 0, inner: false },
  { label: '申', startDeg: 0, endDeg: 60, inner: false },
  { label: '酉', startDeg: 60, endDeg: 120, inner: false },
  { label: '戌', startDeg: 120, endDeg: 180, inner: false },
  { label: '亥', startDeg: 180, endDeg: 240, inner: false }
];

function getCurrentAngleIndex(h) {
  if (h >= 23 || h < 1) return 0;
  if (h >= 1 && h < 3) return 1;
  if (h >= 3 && h < 5) return 2;
  if (h >= 5 && h < 7) return 3;
  if (h >= 7 && h < 9) return 4;
  if (h >= 9 && h < 11) return 5;
  if (h >= 11 && h < 13) return 6;
  if (h >= 13 && h < 15) return 7;
  if (h >= 15 && h < 17) return 8;
  if (h >= 17 && h < 19) return 9;
  if (h >= 19 && h < 21) return 10;
  if (h >= 21 && h < 23) return 11;
  return 0;
}

function drawClock(t) {
  ctx.clearRect(0, 0, 400, 400);
  var h = t.getHours();
  var m = t.getMinutes();
  var s = t.getSeconds();

  ctx.beginPath();
  ctx.arc(cx, cy, EDGE_R, 0, Math.PI * 2);
  ctx.fillStyle = '#F7FBF9';
  ctx.fill();
  ctx.strokeStyle = 'rgba(58,107,90,0.15)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  var currentIdx = getCurrentAngleIndex(h);

  for (var i = 0; i < ANGLE_DATA.length; i++) {
    var sc = ANGLE_DATA[i];
    var isActive = (i === currentIdx);
    var isInner = sc.inner;

    var sa = sc.startDeg * Math.PI / 180;
    var ea = sc.endDeg * Math.PI / 180;
    var r1 = isInner ? INNER_R1 : OUTER_R1;
    var r2 = isInner ? INNER_R2 : OUTER_R2;

    ctx.beginPath();
    ctx.moveTo(cx + r1 * Math.cos(sa), cy + r1 * Math.sin(sa));
    ctx.arc(cx, cy, r1, sa, ea, false);
    ctx.arc(cx, cy, r2, ea, sa, true);
    ctx.closePath();

    if (isActive) {
      ctx.fillStyle = 'rgba(58,107,90,0.20)';
    } else {
      ctx.fillStyle = (i % 2 === 0) ? 'rgba(200,221,216,0.12)' : 'rgba(234,243,238,0.06)';
    }
    ctx.fill();
    ctx.strokeStyle = 'rgba(58,107,90,0.08)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    var midDeg = (sc.startDeg + sc.endDeg) / 2;
    var midRad = midDeg * Math.PI / 180;
    var labelR = (r1 + r2) / 2;

    ctx.save();
    ctx.translate(cx + labelR * Math.cos(midRad), cy + labelR * Math.sin(midRad));
    ctx.rotate(midRad + Math.PI / 2);
    ctx.font = (isInner ? 16 : 22) + 'px "Noto Serif SC", serif';
    ctx.fillStyle = isActive ? '#274D3E' : '#6B8A7A';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(sc.label, 0, 0);
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(cx, cy, INNER_R2, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(58,107,90,0.15)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, OUTER_R2, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(58,107,90,0.10)';
  ctx.lineWidth = 1;
  ctx.stroke();

  for (var i = 1; i <= 12; i++) {
    var deg = i * 30 - 90;
    var rad = deg * Math.PI / 180;
    var nr = (NUM_R1 + NUM_R2) / 2;
    ctx.font = '15px "Noto Serif SC", serif';
    ctx.fillStyle = '#3D5C4A';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i, cx + nr * Math.cos(rad), cy + nr * Math.sin(rad));
  }

  ctx.font = '22px serif';
  ctx.fillStyle = 'rgba(58,107,90,0.15)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('☯', cx, cy);

  var hAngle = ((h % 12) * 30 + m * 0.5 - 90) * Math.PI / 180;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(hAngle);
  ctx.beginPath();
  ctx.moveTo(-6, 0);
  ctx.lineTo(HOUR_LEN, 0);
  ctx.strokeStyle = '#274D3E';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  var mAngle = (m * 6 + s * 0.1 - 90) * Math.PI / 180;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(mAngle);
  ctx.beginPath();
  ctx.moveTo(-5, 0);
  ctx.lineTo(MIN_LEN, 0);
  ctx.strokeStyle = '#3A6B5A';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  var sAngle = (s * 6 - 90) * Math.PI / 180;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(sAngle);
  ctx.beginPath();
  ctx.moveTo(-8, 0);
  ctx.lineTo(SEC_LEN, 0);
  ctx.strokeStyle = '#B04040';
  ctx.lineWidth = 1.2;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#274D3E';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#B04040';
  ctx.fill();
}

// ============================================================
// 数字时间
// ============================================================
function updateDigital(t) {
  var hh = String(t.getHours()).padStart(2, '0');
  var mm = String(t.getMinutes()).padStart(2, '0');
  var ss = String(t.getSeconds()).padStart(2, '0');
  document.getElementById('digitalTime').textContent = hh + ':' + mm + ':' + ss;
}

// ============================================================
// 时辰卡片
// ============================================================
function updateShichenCard(h) {
  var sc = getShichen(h);
  document.getElementById('scSymbol').textContent = sc.glyph;
  document.getElementById('scName').textContent = sc.name + ' · ' + sc.meridian;
  document.getElementById('scMeridian').textContent = sc.meridian + '当令';
  document.getElementById('scTip').textContent = sc.tip;
}

// ============================================================
// 流注表
// ============================================================
function buildGrid() {
  var g = document.getElementById('shichenGrid');
  g.innerHTML = '';
  for (var i = 0; i < SHICHEN.length; i++) {
    var sc = SHICHEN[i];
    var d = document.createElement('div');
    d.className = 'grid-item';
    d.id = 'sc-' + sc.idx;
    d.innerHTML = '<div class="glyph">' + sc.glyph + '</div><div class="gname">' + sc.name + '</div><div class="gtime">' + sc.range + '</div><div class="badge">当前</div>';
    g.appendChild(d);
  }
}

var lastIdx = -1;
function updateGrid(h) {
  var sc = getShichen(h);
  if (sc.idx === lastIdx) return;
  lastIdx = sc.idx;
  var items = document.querySelectorAll('.grid-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.remove('current');
  }
  var el = document.getElementById('sc-' + sc.idx);
  if (el) { el.classList.add('current'); }
}

// ============================================================
// 农历 + 节气功能
// ============================================================
function updateLunarInfo() {
  var now = new Date();
  var year = now.getFullYear();
  var month = now.getMonth() + 1;
  var day = now.getDate();

  // 1. 农历信息
  var lunarDate = Lunar.getLunarDate(now);
  var yearGZ = Lunar.getYearGanZhi(lunarDate.year);
  var monthGZ = Lunar.getMonthGanZhi(lunarDate.year, lunarDate.month);
  var zodiac = Lunar.getShengXiao(lunarDate.year);
  var dayGZ = Lunar.getDayGanZhi(now);

  document.getElementById('lunarGanZhi').textContent = yearGZ + '年 ' + monthGZ + '月 ' + dayGZ + '日';
  document.getElementById('lunarDetail').textContent = '农历 ' + lunarDate.monthName + '月 ' + lunarDate.dayName;
  document.getElementById('lunarZodiac').textContent = '🐉 ' + zodiac + '年';

  // 2. 节气数据
  var todayStr = year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
  var termToday = '';

  var grid = document.getElementById('termGrid');
  grid.innerHTML = '';

  for (var i = 0; i < TERMS_2026.length; i++) {
    var term = TERMS_2026[i];
    var termDateStr = year + '-' + String(term.month).padStart(2, '0') + '-' + String(term.day).padStart(2, '0');
    var isToday = (termDateStr === todayStr);

    if (isToday) {
      termToday = '今日 ' + term.name;
    }

    var div = document.createElement('div');
    div.className = 'term-item' + (isToday ? ' today' : '');
    div.innerHTML = '<div class="tname">' + term.name + '</div><div class="tdate">' + term.month + '月' + term.day + '日 ' + String(term.hour).padStart(2,'0') + ':' + String(term.minute).padStart(2,'0') + '</div>';
    grid.appendChild(div);
  }

  document.getElementById('termToday').textContent = termToday ? '🌿 ' + termToday : '';
}

// ============================================================
// 弹窗控制
// ============================================================
var modalOverlay = document.getElementById('modalOverlay');
var btnLunar = document.getElementById('btnLunar');
var modalClose = document.getElementById('modalClose');

function openModal() {
  updateLunarInfo();
  modalOverlay.classList.add('show');
}

function closeModal() {
  modalOverlay.classList.remove('show');
}

btnLunar.addEventListener('click', openModal);
modalClose.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', function(e) {
  if (e.target === modalOverlay) closeModal();
});

// ============================================================
// 主循环
// ============================================================
function tick() {
  var t = getDisplayTime();
  drawClock(t);
  updateDigital(t);
  updateShichenCard(t.getHours());
  updateGrid(t.getHours());
}

buildGrid();
requestGPS();
tick();
setInterval(tick, 1000);

console.log('✅ 子午流注已启动');
</script>
